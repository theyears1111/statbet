<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatBet Terminal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--mono:ui-monospace,Menlo,monospace}
body{font-family:var(--font);background:#0A0D13;color:#E6E9EF;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:14px}
.shell{background:#0E1117;border:1px solid #1C2230;border-radius:18px;overflow:hidden}
.hd{padding:16px 20px;background:#12161F;border-bottom:1px solid #1C2230;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hd-l{display:flex;align-items:center;gap:12px}
.hd-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FF6B35,#D8431A);display:flex;align-items:center;justify-content:center;font-size:18px}
.hd-brand{font-size:16px;font-weight:600}
.hd-sub{font-size:11px;color:#6B7488;margin-top:2px;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#2BD673;box-shadow:0 0 6px #2BD673}
.btn{background:#1A202C;border:1px solid #232A38;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:#9AA4B8}
.btn:hover{background:#222A38;color:#E6E9EF}
.tabs{display:flex;background:#12161F;border-bottom:1px solid #1C2230;padding:0 16px;gap:2px}
.tab{padding:12px 16px;font-size:13px;color:#8A93A6;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px;transition:.15s}
.tab:hover{color:#E6E9EF}
.tab.on{color:#FF6B35;border-bottom-color:#FF6B35;font-weight:500}
.body{padding:14px 16px}
.pan{display:none}.pan.on{display:block}
.day-bar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.db{font-size:12px;padding:7px 13px;border-radius:9px;border:1px solid #232A38;background:#161B25;cursor:pointer;color:#8A93A6;text-align:center;min-width:68px}
.db:hover{border-color:#2E3848;color:#E6E9EF}
.db.on{background:#FF6B35;color:#fff;border-color:#FF6B35;font-weight:500}
.db-day{font-size:9px;opacity:.8;text-transform:uppercase;letter-spacing:.05em}
.db-date{font-size:13px;font-weight:600;margin-top:2px}
.db-n{font-size:9px;color:#6B7488;margin-top:2px}
.db.on .db-n{color:rgba(255,255,255,.7)}
.fbar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.fb{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid #232A38;background:#161B25;cursor:pointer;color:#8A93A6}
.fb:hover{border-color:#2E3848;color:#E6E9EF}
.fb.on{background:#E6E9EF;color:#0E1117;border-color:#E6E9EF;font-weight:500}
.lgh{display:flex;align-items:center;gap:8px;padding:10px 2px 6px;font-size:9px;color:#6B7488;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.lgh .ln{flex:1;height:1px;background:#1C2230}
.mc{background:#141923;border:1px solid #1F2632;border-radius:12px;margin-bottom:6px;cursor:pointer;overflow:hidden;transition:.15s}
.mc:hover{border-color:#2E3848;background:#171D28}
.mc-strip{height:3px;background:#1C2230}
.mc-in{padding:11px 13px}
.mc-top{display:flex;align-items:center;gap:12px}
.mc-time{min-width:44px;text-align:center}
.mc-time-h{font-size:13px;font-weight:600}
.mc-time-s{font-size:9px;color:#6B7488;margin-top:2px}
.mc-tms{flex:1}
.mc-row{display:flex;align-items:center;gap:8px;padding:2px 0}
.mc-nm{font-size:14px;font-weight:500;flex:1}
.mc-sc{font-size:15px;font-weight:700;min-width:18px;text-align:right;font-family:var(--mono)}
.mc-badge{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:600;margin-left:6px}
.mc-badge.hot{background:rgba(255,107,53,.2);color:#FF8E5E}
.mc-badge.warm{background:rgba(255,166,48,.15);color:#FFB958}
.dt{width:13px;height:13px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.dt-W{background:rgba(43,214,115,.18);color:#2BD673}
.dt-D{background:rgba(138,147,166,.16);color:#A4ADBF}
.dt-L{background:rgba(255,90,90,.16);color:#FF6B6B}
.state{text-align:center;padding:40px 20px;color:#7E8798}
.spinner{width:26px;height:26px;border:3px solid #1C2230;border-top-color:#FF6B35;border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:rgba(255,90,90,.08);border:1px solid rgba(255,90,90,.25);border-radius:10px;padding:12px;color:#FF9B9B;font-size:12px;line-height:1.6}
.li{display:flex;align-items:center;gap:8px;color:#7E8798;font-size:12px;padding:16px 0}
.sm{width:15px;height:15px;border:2px solid #1C2230;border-top-color:#FF6B35;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
/* OVERLAY PARTITA */
.ov{display:none;margin-top:12px}.ov.on{display:block}
.det{background:#141923;border:1px solid #1F2632;border-radius:14px;overflow:hidden}
.det-h{padding:15px 16px;background:#12161F;border-bottom:1px solid #1C2230;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.det-t{font-size:16px;font-weight:600}
.det-m{font-size:11px;color:#7E8798;margin-top:3px}
.det-b{padding:13px 15px}
.flt{margin-bottom:12px;padding:10px 12px;background:#0E1117;border:1px solid #1F2632;border-radius:10px}
.flt-l{font-size:9px;color:#6B7488;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:600}
.flt-l:not(:first-child){margin-top:10px}
.flt-p{display:flex;gap:4px;flex-wrap:wrap}
.fp{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid #232A38;background:#141923;cursor:pointer;color:#8A93A6}
.fp:hover{border-color:#2E3848;color:#E6E9EF}
.fp.on{background:#FF6B35;color:#fff;border-color:#FF6B35}
.fp.win.on{background:#3B9EFF;border-color:#3B9EFF}
/* ANALISI */
.an-section{background:#0E1117;border:1px solid #1A202C;border-radius:12px;padding:13px;margin-bottom:10px}
.an-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.an-title .ico{font-size:16px}
.sct{font-size:9px;font-weight:700;color:#6B7488;text-transform:uppercase;letter-spacing:.1em;margin:12px 0 7px;display:flex;align-items:center;gap:6px}
.sct .sl{flex:1;height:1px;background:#1C2230;margin-left:3px}
/* SEGNALI */
.sig{border-radius:10px;padding:10px 12px;margin-bottom:7px;border-left:3px solid transparent}
.sig.hot{background:linear-gradient(135deg,rgba(255,107,53,.1),rgba(255,107,53,.03));border-left-color:#FF6B35}
.sig.warm{background:linear-gradient(135deg,rgba(255,166,48,.08),transparent);border-left-color:#FFA630}
.sig.cool{background:linear-gradient(135deg,rgba(59,158,255,.08),transparent);border-left-color:#3B9EFF}
.sig.pu{background:linear-gradient(135deg,rgba(139,123,246,.1),transparent);border-left-color:#A79BF8}
.sig.gr{background:linear-gradient(135deg,rgba(43,214,115,.08),transparent);border-left-color:#2BD673}
.sig-top{display:flex;align-items:flex-start;gap:10px}
.sig-conf{text-align:center;min-width:48px}
.sig-conf-n{font-size:20px;font-weight:700;line-height:1}
.sig.hot .sig-conf-n{color:#FF8E5E}
.sig.warm .sig-conf-n{color:#FFB958}
.sig.cool .sig-conf-n{color:#6BB4FF}
.sig.pu .sig-conf-n{color:#A79BF8}
.sig.gr .sig-conf-n{color:#4FDE8E}
.sig-conf-l{font-size:8px;color:#6B7488;text-transform:uppercase;margin-top:2px}
.sig-body{flex:1}
.sig-title{font-size:13px;font-weight:600;color:#E6E9EF;margin-bottom:3px}
.sig-why{font-size:11px;color:#8A93A6;line-height:1.5;margin-bottom:6px}
.sig-bets{display:flex;flex-wrap:wrap;gap:4px}
.sig-bet{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500}
.sig-bet.goal{background:rgba(255,107,53,.14);color:#FF8E5E}
.sig-bet.corner{background:rgba(139,123,246,.14);color:#A79BF8}
.sig-bet.combo{background:rgba(43,214,115,.12);color:#4FDE8E}
.sig-bet.exact{background:rgba(255,214,0,.1);color:#FFD700}
.sig-bet.h2h{background:rgba(59,158,255,.12);color:#6BB4FF}
.sig-bet.draw{background:rgba(138,147,166,.12);color:#A4ADBF}
/* STATS MINI */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.av{background:#141923;border:1px solid #1A202C;border-radius:8px;padding:8px 7px;text-align:center}
.av.hi{border-color:rgba(255,107,53,.2);background:linear-gradient(160deg,rgba(255,107,53,.08),transparent)}
.av.bl{border-color:rgba(59,158,255,.2);background:linear-gradient(160deg,rgba(59,158,255,.06),transparent)}
.av.gr{border-color:rgba(43,214,115,.2);background:linear-gradient(160deg,rgba(43,214,115,.06),transparent)}
.av.pu{border-color:rgba(139,123,246,.2);background:linear-gradient(160deg,rgba(139,123,246,.06),transparent)}
.av.ye{border-color:rgba(255,214,0,.2);background:linear-gradient(160deg,rgba(255,214,0,.06),transparent)}
.av-v{font-size:17px;font-weight:600;line-height:1}
.av.hi .av-v{color:#FF8E5E}.av.bl .av-v{color:#6BB4FF}.av.gr .av-v{color:#4FDE8E}.av.pu .av-v{color:#A79BF8}.av.ye .av-v{color:#FFD700}
.av-l{font-size:8px;color:#6B7488;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.av-s{font-size:7px;color:#525B6F;margin-top:2px}
.sb{background:#141923;border:1px solid #1A202C;border-radius:8px;padding:8px 9px}
.sb.hot{border-color:rgba(255,107,53,.3);background:linear-gradient(160deg,rgba(255,107,53,.08),transparent)}
.sb.warm{border-color:rgba(255,166,48,.28)}.sb.cool{border-color:rgba(59,158,255,.26)}.sb.safe{border-color:rgba(43,214,115,.26)}
.sb-l{font-size:8px;color:#7E8798;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.sb-v{font-size:18px;font-weight:600;line-height:1.05;margin-top:4px}
.sb.hot .sb-v{color:#FF6B35}.sb.warm .sb-v{color:#FFA630}.sb.cool .sb-v{color:#3B9EFF}.sb.safe .sb-v{color:#2BD673}
.sb-s{font-size:7px;color:#525B6F;margin-top:2px;text-transform:uppercase}
.h2r{display:grid;grid-template-columns:1fr 52px 1fr;gap:7px;padding:7px 9px;background:#141923;border:1px solid #1A202C;border-radius:8px;margin-bottom:3px;align-items:center}
.h2-s{text-align:center;font-weight:700;font-size:14px;background:#1A202C;border-radius:6px;padding:3px 0;font-family:var(--mono)}
.h2-h{text-align:right;font-size:12px}.h2-a{text-align:left;font-size:12px}
.h2-d{font-size:8px;color:#6B7488;text-align:center;margin-top:2px}
.er{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:#141923;border:1px solid #1A202C;border-radius:7px;margin-bottom:3px}
.er-s{font-size:13px;font-weight:700;font-family:var(--mono);letter-spacing:.06em}
.er-rare{color:#FF6B35}.er-m{font-size:10px;color:#7E8798}
.nd{font-size:11px;color:#525B6F;background:#12161F;border-radius:7px;padding:6px 9px;margin-top:5px;font-style:italic}
.hp{font-size:8px;background:rgba(59,158,255,.18);color:#6BB4FF;padding:2px 7px;border-radius:6px;text-transform:uppercase;font-weight:700}
.ap{font-size:8px;background:rgba(255,107,53,.18);color:#FF8E5E;padding:2px 7px;border-radius:6px;text-transform:uppercase;font-weight:700}
/* SOMMARIO FINALE */
.summary{background:linear-gradient(135deg,rgba(43,214,115,.1),rgba(43,214,115,.02));border:1px solid rgba(43,214,115,.3);border-radius:12px;padding:14px;margin-bottom:12px}
.summary-h{font-size:14px;font-weight:600;color:#4FDE8E;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pick{background:#0E1117;border:1px solid rgba(43,214,115,.2);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
.pick-conf{font-size:20px;font-weight:700;min-width:44px;text-align:center}
.pick-body{flex:1}
.pick-bet{font-size:13px;font-weight:600;color:#E6E9EF}
.pick-why{font-size:11px;color:#7E8798;margin-top:3px;line-height:1.4}
.pick-lvl{font-size:8px;padding:2px 6px;border-radius:5px;text-transform:uppercase;font-weight:700;margin-top:4px;display:inline-block}
.pick-lvl.alta{background:rgba(43,214,115,.16);color:#4FDE8E}
.pick-lvl.media{background:rgba(255,166,48,.14);color:#FFB958}
.pick-lvl.bassa{background:rgba(138,147,166,.12);color:#A4ADBF}
</style>
</head>
<body>
<div class="wrap"><div class="shell">
  <div class="hd">
    <div class="hd-l">
      <div class="hd-logo">📊</div>
      <div>
        <div class="hd-brand">StatBet Terminal</div>
        <div class="hd-sub"><span class="live-dot"></span><span id="sub">caricamento…</span></div>
      </div>
    </div>
    <button class="btn" onclick="refreshCurrent()">⟳ Aggiorna</button>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-partite" onclick="switchTab('partite',this)">📅 Partite</div>
    <div class="tab" id="tab-analisi" onclick="switchTab('analisi',this)">🔍 Analisi</div>
  </div>
  <div class="body">
    <div id="pan-partite" class="pan on">
      <div id="day-bar" class="day-bar"></div>
      <div id="fbar" class="fbar"></div>
      <div id="ml"><div class="state"><div class="spinner"></div>Caricamento…</div></div>
      <div class="ov" id="ov"><div class="det" id="det"></div></div>
    </div>
    <div id="pan-analisi" class="pan">
      <div id="an-day-bar" class="day-bar"></div>
      <div id="an-fbar" class="fbar"></div>
      <div id="an-list"></div>
      <div class="ov" id="an-ov"><div class="det" id="an-det"></div></div>
    </div>
  </div>
</div></div>

<script>
let ALL=[],curDay='',curLeague='all';
let anDay='',anLeague='all';
let clv='all',cw='20';
let curMatch=null;

function refreshCurrent(){
  const onAnalisi=document.getElementById('pan-analisi').classList.contains('on');
  if(onAnalisi) { anDay=''; buildAnalisiList(); }
  else loadMatches(true);
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.pan').forEach(p=>p.classList.remove('on'));
  document.getElementById('pan-'+name).classList.add('on');
  if(name==='analisi' && ALL.length) buildAnalisiList();
}

// ── PARTITE ──
async function loadMatches(force=false){
  document.getElementById('ml').innerHTML='<div class="state"><div class="spinner"></div>Caricamento partite…</div>';
  document.getElementById('ov').classList.remove('on');
  try{
    const r=await fetch('/api/matches'+(force?'?refresh=1':''));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.error)throw new Error(j.error);
    ALL=j.matches||[];
    document.getElementById('sub').textContent=j.date+' · '+ALL.length+' partite'+(j.cached?' · cache':'');
    const today=new Date().toISOString().slice(0,10);
    const days=[...new Set(ALL.map(m=>m.date))].sort();
    curDay=days.includes(today)?today:(days[0]||today);
    buildDayBar(days);buildLeagueBar();renderMatches();
  }catch(e){
    document.getElementById('ml').innerHTML='<div class="err">❌ '+e.message+'</div>';
  }
}

function buildDayBar(days){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('day-bar').innerHTML=days.map(d=>{
    const dt=new Date(d+'T12:00:00Z');
    const label=d===today?'Oggi':dt.toLocaleDateString('it-IT',{weekday:'short'});
    const num=dt.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    const n=ALL.filter(m=>m.date===d).length;
    return '<button class="db '+(d===curDay?'on':'')+'" onclick="setDay(\''+d+'\')">' +
      '<div class="db-day">'+label+'</div><div class="db-date">'+num+'</div>' +
      '<div class="db-n">'+n+' gare</div></button>';
  }).join('');
}
function buildLeagueBar(){
  const leagues=[...new Set(ALL.filter(m=>m.date===curDay).map(m=>m.leagueName))];
  document.getElementById('fbar').innerHTML=
    '<button class="fb '+(curLeague==='all'?'on':'')+'" onclick="setLeague(\'all\')">Tutte</button>'+
    leagues.map(l=>'<button class="fb '+(curLeague===l?'on':'')+'" onclick="setLeague(\''+l.replace(/'/g,'')+'\')">'+l+'</button>').join('');
}
function setDay(d){curDay=d;curLeague='all';document.getElementById('ov').classList.remove('on');
  buildDayBar([...new Set(ALL.map(m=>m.date))].sort());buildLeagueBar();renderMatches();}
function setLeague(l){curLeague=l;buildLeagueBar();renderMatches();}
function renderMatches(){
  const filtered=ALL.filter(m=>m.date===curDay&&(curLeague==='all'||m.leagueName===curLeague));
  if(!filtered.length){document.getElementById('ml').innerHTML='<div class="state">Nessuna partita.</div>';return;}
  const byL={};filtered.forEach(m=>{(byL[m.leagueName]=byL[m.leagueName]||[]).push(m);});
  let html='';
  for(const[lg,ms]of Object.entries(byL)){
    html+='<div class="lgh">'+lg+'<div class="ln"></div><span>'+ms.length+'</span></div>';
    ms.forEach(m=>{
      const scored=m.homeScore!==null&&m.awayScore!==null;
      const sh=scored?'<span class="mc-sc">'+m.homeScore+'</span>':'';
      const sa=scored?'<span class="mc-sc">'+m.awayScore+'</span>':'';
      html+='<div class="mc" onclick="openMatch(\''+m.id+'\',false)">' +
        '<div class="mc-strip"></div><div class="mc-in"><div class="mc-top">' +
        '<div class="mc-time"><div class="mc-time-h">'+m.time.slice(0,5)+'</div>' +
        '<div class="mc-time-s">'+(m.status==='finished'?'FT':'')+'</div></div>' +
        '<div class="mc-tms"><div class="mc-row"><span class="mc-nm">'+m.homeName+'</span>'+sh+'</div>' +
        '<div class="mc-row"><span class="mc-nm">'+m.awayName+'</span>'+sa+'</div></div>' +
        '</div></div></div>';
    });
  }
  document.getElementById('ml').innerHTML=html;
}

// ── ANALISI LIST ──
function buildAnalisiList(){
  if(!ALL.length)return;
  const today=new Date().toISOString().slice(0,10);
  const days=[...new Set(ALL.map(m=>m.date))].sort();
  if(!anDay) anDay=days.includes(today)?today:(days[0]||today);
  // Day bar
  document.getElementById('an-day-bar').innerHTML=days.map(d=>{
    const dt=new Date(d+'T12:00:00Z');
    const label=d===today?'Oggi':dt.toLocaleDateString('it-IT',{weekday:'short'});
    const num=dt.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    const n=ALL.filter(m=>m.date===d).length;
    return '<button class="db '+(d===anDay?'on':'')+'" onclick="setAnDay(\''+d+'\')">' +
      '<div class="db-day">'+label+'</div><div class="db-date">'+num+'</div>' +
      '<div class="db-n">'+n+' gare</div></button>';
  }).join('');
  // League bar
  const leagues=[...new Set(ALL.filter(m=>m.date===anDay).map(m=>m.leagueName))];
  document.getElementById('an-fbar').innerHTML=
    '<button class="fb '+(anLeague==='all'?'on':'')+'" onclick="setAnLeague(\'all\')">Tutte</button>'+
    leagues.map(l=>'<button class="fb '+(anLeague===l?'on':'')+'" onclick="setAnLeague(\''+l.replace(/'/g,'')+'\')">'+l+'</button>').join('');
  // Match list
  const filtered=ALL.filter(m=>m.date===anDay&&(anLeague==='all'||m.leagueName===anLeague));
  const byL={};filtered.forEach(m=>{(byL[m.leagueName]=byL[m.leagueName]||[]).push(m);});
  let html='';
  for(const[lg,ms]of Object.entries(byL)){
    html+='<div class="lgh">'+lg+'<div class="ln"></div><span>'+ms.length+'</span></div>';
    ms.forEach(m=>{
      const scored=m.homeScore!==null&&m.awayScore!==null;
      const sh=scored?'<span class="mc-sc">'+m.homeScore+'</span>':'';
      const sa=scored?'<span class="mc-sc">'+m.awayScore+'</span>':'';
      html+='<div class="mc" onclick="openMatch(\''+m.id+'\',true)">' +
        '<div class="mc-strip" style="background:linear-gradient(90deg,#FF6B35,#D8431A)"></div>' +
        '<div class="mc-in"><div class="mc-top">' +
        '<div class="mc-time"><div class="mc-time-h">'+m.time.slice(0,5)+'</div>' +
        '<div class="mc-time-s" style="color:#FF6B35;font-size:8px">ANALISI</div></div>' +

    });
  }
  document.getElementById('an-list').innerHTML=html||'<div class="state">Nessuna partita.</div>';
}

async function openMatch(id, isAnalisi=false){
  const m=ALL.find(x=>String(x.id)===String(id));
  if(!m)return;
  curMatch=m;clv='all';cw='20';

  const ovId=isAnalisi?'an-ov':'ov';
  const detId=isAnalisi?'an-det':'det';

  document.getElementById(ovId).classList.add('on');
  document.getElementById(detId).innerHTML=
    '<div class="det-h"><div><div class="det-t">'+m.homeName+' <span style="color:#6B7488;font-weight:400">vs</span> '+m.awayName+'</div>' +
    '<div class="det-m">'+m.leagueName+' · '+m.date+' · ore '+m.time+'</div></div>' +
    '<button class="btn" onclick="document.getElementById(\''+ovId+'\').classList.remove(\'on\')">✕ chiudi</button></div>' +
    '<div class="det-b"><div class="li"><div class="sm"></div>Caricamento statistiche complete…</div></div>';
  document.getElementById(ovId).scrollIntoView({behavior:'smooth'});

  try{
    const[hR,aR,h2R]=await Promise.all([
      fetch('/api/team?id='+m.homeId).then(r=>r.json()),
      fetch('/api/team?id='+m.awayId).then(r=>r.json()),
      fetch('/api/h2h?home='+m.homeId+'&away='+m.awayId).then(r=>r.json()),
    ]);
    m._hfx=hR.fixtures||[];
    m._afx=aR.fixtures||[];
    m._h2h=h2R.h2h||[];
    if(isAnalisi) renderAnalisi(detId);
    else renderStats(detId);
  }catch(e){
    document.getElementById(detId).querySelector('.det-b').innerHTML='<div class="err">Errore: '+e.message+'</div>';
  }
}

// ── UTILS STATISTICI ──
function av(arr,sel){const v=(arr||[]).map(sel).filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function avN(v,d){return v!=null?v.toFixed(d??1):'—'}
function sk(fx,c){let n=0;for(const f of fx){if(c(f))n++;else break;}return n;}
function fFx(fx,lv,compId,isHome){
  if(lv==='casa')return fx.filter(f=>f.h===(isHome?1:0));
  if(lv==='comp')return fx.filter(f=>f.compId===compId);
  if(lv==='casaComp')return fx.filter(f=>f.compId===compId&&f.h===(isHome?1:0));
  return fx;
}
function wFx(fx){const n=cw==='10'?10:cw==='20'?20:cw==='50'?50:9999;return fx.slice(0,n);}
function par(fx){
  if(!fx.length)return{t:'-',n:0};
  const p=(fx[0].gf??0)+(fx[0].ga??0);const isP=p%2===0;
  let n=0;for(const f of fx){if(((f.gf??0)+(f.ga??0))%2===0===isP)n++;else break;}
  return{t:isP?'Pari':'Dispari',n};
}
function dots(fx){
  return fx.slice(0,5).map(f=>{const r=(f.gf??0)>(f.ga??0)?'W':(f.gf??0)<(f.ga??0)?'L':'D';
    return '<span class="dt dt-'+r+'">'+r+'</span>';}).join('');
}
function over(fx,kFn,min){
  const seen={},freq={};
  fx.forEach((f,i)=>{const k=kFn(f);if(!k||k.includes('null'))return;if(!(k in seen))seen[k]=i;freq[k]=(freq[k]||0)+1;});
  return Object.keys(seen).filter(k=>freq[k]>=(min||1)).map(k=>({s:k,n:seen[k],f:freq[k]})).sort((a,b)=>b.n-a.n).slice(0,5);
}

// ── RENDER ANALISI (metodo Gianluca) ──
function renderAnalisi(detId){
  const m=curMatch;
  const FILTERS=[
    {key:'all',label:'Tutte le competizioni',short:'Tutte'},
    {key:'casa',label:'Casa/trasferta',short:'C/T'},
    {key:'comp',label:'Solo '+m.leagueName,short:'Comp.'},
    {key:'casaComp',label:'Casa/tras. + comp.',short:'C/T+Comp.'},
  ];

  const picks=[]; // scommesse finali suggerite

  // === PER OGNI SQUADRA (casa e trasferta) ===
  function analyzeTeam(fxAll, name, isHome){
    const results=[];
    for(const flt of FILTERS){
      const fx=wFx(fFx(fxAll,flt.key,m.compId,isHome));
      if(fx.length<3)continue;
      const fx1h=fx.filter(f=>f.hgf!=null);
      const fxXG=fx.filter(f=>f.xg!=null);
      const fxCo=fx.filter(f=>f.corners!=null);
      const fxSh=fx.filter(f=>f.shots!=null);

      // 1. NON SEGNA streak
      const ngS=sk(fx,f=>(f.gf??0)===0);
      if(ngS>=2){
        const xgSum=fxXG.slice(0,Math.max(ngS,3)).reduce((s,f)=>s+(f.xg??0),0);
        const xg1hSum=fxXG.slice(0,Math.max(ngS,3)).reduce((s,f)=>s+(f.xg1h??0),0);
        const bcTot=fx.slice(0,ngS).reduce((s,f)=>s+(f.bigChances??0),0);
        const bcMiss=fx.slice(0,ngS).reduce((s,f)=>s+(f.bigChancesMissed??0),0);
        let conf=50;
        if(xgSum>=4)conf+=25;else if(xgSum>=2.5)conf+=15;else if(xgSum>=1.5)conf+=8;
        if(bcTot>=5)conf+=8;if(bcMiss>=3)conf+=7;if(ngS>=4)conf+=8;
        conf=Math.min(95,conf);
        results.push({
          type:'goal',conf,filter:flt.label,filterShort:flt.short,
          title:name+(isHome?' (Casa)':' (Trasferta)')+' non segna da '+ngS+' gare',
          why:'xG accumulato nelle ultime '+Math.max(ngS,3)+' gare: '+avN(xgSum,2)+
              (xg1hSum>0?' · xG 1°T: '+avN(xg1hSum,2):'')+
              (bcTot>0?' · Big chances create: '+bcTot+(bcMiss>0?', mancate: '+bcMiss:''): ''),
          bets:['Segna '+name,(isHome?'GG':'GG'),'Over 0.5 gol '+name],betCls:'goal',
          name,isHome,ngS,xgSum
        });
        if(conf>=70) picks.push({bet:'Segna '+name+' / NG avversario',conf,why:name+' a secco da '+ngS+' gare · xG accum. '+avN(xgSum,2),lvl:conf>=80?'alta':'media',filter:flt.short});
      }

      // 2. NON VINCE streak
      const nvS=sk(fx,f=>(f.gf??0)<=(f.ga??0));
      if(nvS>=5) results.push({
        type:'streak',conf:Math.min(78,45+nvS*4),filter:flt.label,filterShort:flt.short,
        title:name+' senza vittoria da '+nvS+' gare',
        why:'Striscia negativa di '+nvS+' partite senza vincere in '+flt.label,
        bets:['No vittoria '+name,'X o '+(isHome?'2':'1')],betCls:'draw'
      });

      // 3. NON PAREGGIA streak (lungo)
      const ndS=sk(fx,f=>(f.gf??0)!==(f.ga??0));
      if(ndS>=8){
        let conf=Math.min(85,40+ndS*4);
        results.push({
          type:'nodraw',conf,filter:flt.label,filterShort:flt.short,
          title:name+' senza pareggio da '+ndS+' gare',
          why:'Non pareggia da '+ndS+' partite consecutive in '+flt.label,
          bets:['No pareggio','1 o 2 (doppia chance)'],betCls:'draw'
        });
        if(conf>=65) picks.push({bet:'No pareggio',conf,why:name+' senza X da '+ndS+' gare ('+flt.short+')',lvl:conf>=75?'alta':'media',filter:flt.short});
      }

      // 4. NON PAREGGIA 1°T streak
      if(fx1h.length>=4){
        const nd1hS=sk(fx1h,f=>(f.hgf??0)!==(f.hga??0));
        if(nd1hS>=5) results.push({
          type:'nodraw1h',conf:Math.min(78,42+nd1hS*4),filter:flt.label,filterShort:flt.short,
          title:name+' senza pareggio nel 1°T da '+nd1hS+' gare',
          why:'Non pareggia la prima frazione da '+nd1hS+' partite consecutive',
          bets:['No pareggio 1°T'],betCls:'draw'
        });

        // 5. NON SEGNA 1°T
        const ng1hS=sk(fx1h,f=>(f.hgf??0)===0);
        if(ng1hS>=3){
          const xg1hSum=fxXG.slice(0,ng1hS+1).reduce((s,f)=>s+(f.xg1h??0),0);
          let conf=45+Math.min(25,ng1hS*5);
          if(xg1hSum>=1.5)conf+=12;
          results.push({
            type:'goal1h',conf:Math.min(88,conf),filter:flt.label,filterShort:flt.short,
            title:name+' non segna nel 1°T da '+ng1hS+' gare',
            why:'xG 1°T accumulato: '+avN(xg1hSum,2),
            bets:['Segna '+name+' 1°T','Over 0.5 gol 1°T'],betCls:'goal'
          });
        }

        // 6. IMBATTUTA 1°T
        const nl1hS=sk(fx1h,f=>(f.hgf??0)>=(f.hga??0));
        if(nl1hS>=5){
          let conf=Math.min(90,55+nl1hS*3);
          results.push({
            type:'1hnl',conf,filter:flt.label,filterShort:flt.short,
            title:name+' imbattuta nel 1°T da '+nl1hS+' gare',
            why:'Non perde la prima frazione da '+nl1hS+' partite in '+flt.label,
            bets:[isHome?'1X primo tempo':'X2 primo tempo','Pareggio o '+name+' 1°T'],betCls:'combo'
          });
          if(conf>=68) picks.push({bet:(isHome?'1X':'X2')+' primo tempo',conf,why:name+' imbattuta 1°T da '+nl1hS+' ('+flt.short+')',lvl:conf>=78?'alta':'media',filter:flt.short});
        }

        // 7. NON VINCE 1°T
        const nw1hS=sk(fx1h,f=>(f.hgf??0)<=(f.hga??0));
        if(nw1hS>=5) results.push({
          type:'1hnw',conf:Math.min(82,48+nw1hS*3),filter:flt.label,filterShort:flt.short,
          title:name+' senza vittoria nel 1°T da '+nw1hS+' gare',
          why:'Non vince la prima frazione da '+nw1hS+' partite',
          bets:['No '+name+' 1°T'],betCls:'combo'
        });
      }

      // 8. CORNER ritorno media
      if(fxCo.length>=5){
        const coAvg=av(fxCo,f=>f.corners);
        const coRec=av(fxCo.slice(0,4),f=>f.corners);
        if(coAvg!=null&&coRec!=null){
          const gap=coAvg-coRec;
          if(gap>=2){
            let conf=Math.min(84,50+gap*7);
            results.push({
              type:'corner',conf,filter:flt.label,filterShort:flt.short,
              title:'Corner '+name+': ritorno alla media (gap '+avN(gap)+')',
              why:'Media stagionale: '+avN(coAvg)+' · Ultime 4: '+avN(coRec)+' · Gap: −'+avN(gap),
              bets:['Over corner '+name,'Over corner match'],betCls:'corner'
            });
            if(conf>=65) picks.push({bet:'Over corner '+name,conf,why:'Media '+avN(coAvg)+' → ult.4: '+avN(coRec)+' ('+flt.short+')',lvl:conf>=75?'alta':'media',filter:flt.short});
          }
        }
      }

      // 9. TIRI ritorno media
      if(fxSh.length>=5){
        const shAvg=av(fxSh,f=>f.shots);
        const shRec=av(fxSh.slice(0,4),f=>f.shots);
        if(shAvg!=null&&shRec!=null&&(shAvg-shRec)>=4) results.push({
          type:'shots',conf:Math.min(72,44+(shAvg-shRec)*3),filter:flt.label,filterShort:flt.short,
          title:'Tiri '+name+': sotto la media (media '+avN(shAvg)+' → ult.4: '+avN(shRec)+')',
          why:'La squadra tira significativamente meno della sua media stagionale',
          bets:['Over tiri '+name],betCls:'corner'
        });
      }

      // 10. PORTA INVIOLATA
      const csS=sk(fx,f=>(f.ga??0)===0);
      if(csS>=3) results.push({
        type:'cs',conf:Math.min(80,42+csS*9),filter:flt.label,filterShort:flt.short,
        title:name+' porta inviolata da '+csS+' gare',
        why:'Non subisce gol da '+csS+' partite consecutive in '+flt.label,
        bets:['NG avversario','Under 0.5 gol subiti '+name],betCls:'goal'
      });

      // 11. SOMMA GOL pari/dispari streak
      const pd=par(fx);
      if(pd.n>=5) results.push({
        type:'parity',conf:Math.min(72,40+pd.n*5),filter:flt.label,filterShort:flt.short,
        title:'Somma gol '+name+' '+pd.t.toLowerCase()+' da '+pd.n+' gare',
        why:'Il totale gol della partita è '+pd.t.toLowerCase()+' da '+pd.n+' partite consecutive',
        bets:['Somma gol '+(pd.t==='Pari'?'Dispari':'Pari')+' (rottura striscia)'],betCls:'draw'
      });

      // 12. RISULTATI ESATTI RITARDATARI
      const odFin=over(fx,f=>f.gf+'-'+f.ga,2);
      const od1h=over(fx.filter(f=>f.hgf!=null),f=>f.hgf+'-'+f.hga,2);
      if(odFin.length) results.push({
        type:'exact',conf:null,filter:flt.label,filterShort:flt.short,
        title:'Risultati esatti ritardatari · '+name,
        why:odFin.map(o=>'<b>'+o.s+'</b> manca da '+o.n+' gare (uscito '+o.f+'×)').join(' · '),
        bets:odFin.slice(0,2).map(o=>o.s+' (manca da '+o.n+')'),betCls:'exact'
      });
    }
    return results;
  }

  const homeResults=analyzeTeam(m._hfx,m.homeName,true);
  const awayResults=analyzeTeam(m._afx,m.awayName,false);

  // === H2H ANALISI ===
  const h2h=m._h2h||[];
  const h2hResults=[];
  if(h2h.length>=4){
    // Normalizza dal punto di vista della squadra casa attuale
    const h2hNorm=h2h.map(x=>{
      const swap=String(x.homeId)!==String(m.homeId);
      return{d:x.d,hg:swap?x.ag:x.hg,ag:swap?x.hg:x.ag,hhg:swap?x.hag:x.hhg,hag:swap?x.hhg:x.hag};
    });
    const h2hFx=h2hNorm.map(x=>({gf:x.hg,ga:x.ag,hgf:x.hhg,hga:x.hag,h:1,compId:'h2h'}));
    // No pareggio
    const ndH=sk(h2hFx,f=>f.gf!==f.ga);
    if(ndH>=5){
      let conf=Math.min(88,48+ndH*5);
      h2hResults.push({type:'h2h_nodraw',conf,title:'No pareggio H2H da '+ndH+' precedenti',
        why:'Nessun pareggio negli ultimi '+ndH+' scontri diretti',bets:['No pareggio','1 o 2'],betCls:'h2h'});
      if(conf>=65) picks.push({bet:'No pareggio',conf,why:'No X negli ultimi '+ndH+' H2H',lvl:conf>=75?'alta':'media',filter:'H2H'});
    }
    // No BTTS H2H
    const nbH=sk(h2hFx,f=>f.gf===0||f.ga===0);
    if(nbH>=4){
      let conf=Math.min(84,45+nbH*7);
      h2hResults.push({type:'h2h_nobtts',conf,title:'No BTTS H2H da '+nbH+' precedenti',
        why:'Almeno una squadra non segna in '+nbH+' scontri consecutivi',bets:['No BTTS','Under 1.5'],betCls:'h2h'});
      if(conf>=65) picks.push({bet:'No BTTS',conf,why:'No GG in '+nbH+' H2H consecutivi',lvl:conf>=75?'alta':'media',filter:'H2H'});
    }
    // Casa domina H2H
    const hw=h2hFx.filter(f=>f.gf>f.ga).length;
    if(hw/h2hFx.length>=0.65&&h2hFx.length>=6) h2hResults.push({type:'h2h_home',conf:Math.min(78,35+Math.round(hw/h2hFx.length*50)),
      title:m.homeName+' domina H2H ('+hw+'/'+h2hFx.length+')',
      why:'Vince il '+Math.round(hw/h2hFx.length*100)+'% degli H2H in casa',bets:['Vittoria '+m.homeName,m.homeName+' Over 1.5'],betCls:'h2h'});
    // Risultati esatti H2H ritardatari
    const odH2H=over(h2hFx,f=>f.gf+'-'+f.ga,2);
    if(odH2H.length) h2hResults.push({type:'h2h_exact',conf:null,
      title:'Risultati esatti H2H ritardatari',
      why:odH2H.map(o=>'<b>'+o.s+'</b> manca da '+o.n+' H2H (uscito '+o.f+'×)').join(' · '),
      bets:odH2H.slice(0,2).map(o=>o.s),betCls:'exact'});
    // Non segna casa H2H
    const hngH=sk(h2hFx,f=>f.gf===0);
    if(hngH>=3) h2hResults.push({type:'h2h_homeng',conf:Math.min(78,45+hngH*8),
      title:m.homeName+' non segna in H2H da '+hngH+' precedenti',
      why:'La squadra casa non segna da '+hngH+' scontri diretti consecutivi',
      bets:['NG '+m.homeName,'Segna '+m.awayName],betCls:'h2h'});
    // Non segna trasferta H2H
    const angH=sk(h2hFx,f=>f.ga===0);
    if(angH>=3) h2hResults.push({type:'h2h_awayng',conf:Math.min(78,45+angH*8),
      title:m.awayName+' non segna in H2H da '+angH+' precedenti',
      why:'La squadra trasferta non segna da '+angH+' scontri diretti consecutivi',
      bets:['NG '+m.awayName,'Segna '+m.homeName],betCls:'h2h'});
    // Primo tempo H2H
    const h2hFx1h=h2hFx.filter(f=>f.hgf!=null);
    if(h2hFx1h.length>=4){
      const ndH1h=sk(h2hFx1h,f=>f.hgf!==f.hga);
      if(ndH1h>=4) h2hResults.push({type:'h2h_1hnodraw',conf:Math.min(80,44+ndH1h*6),
        title:'No pareggio 1°T H2H da '+ndH1h+' precedenti',
        why:'Il primo tempo non finisce in parità da '+ndH1h+' H2H consecutivi',
        bets:['No pareggio 1°T'],betCls:'h2h'});
    }
  }

  // === INCROCIO COMBO 1°T (casa imbattuta + trasferta senza W) ===
  const comboResults=[];
  for(const flt of FILTERS){
    const hfx=wFx(fFx(m._hfx,flt.key,m.compId,true));
    const afx=wFx(fFx(m._afx,flt.key,m.compId,false));
    const hfx1h=hfx.filter(f=>f.hgf!=null);
    const afx1h=afx.filter(f=>f.hgf!=null);
    const hNL1h=sk(hfx1h,f=>(f.hgf??0)>=(f.hga??0));
    const aNW1h=sk(afx1h,f=>(f.hgf??0)<=(f.hga??0));
    if(hNL1h>=5&&aNW1h>=5){
      let conf=Math.min(94,62+hNL1h*2+aNW1h*2);
      comboResults.push({type:'combo1h',conf,filter:flt.label,filterShort:flt.short,
        title:'⚡ Combo 1°T: '+m.homeName+' imbattuta ('+hNL1h+') × '+m.awayName+' senza W ('+aNW1h+')',
        why:'Incrocio perfetto: casa non perde il 1°T da '+hNL1h+' · trasferta non vince il 1°T da '+aNW1h+' ('+flt.label+')',
        bets:['1X primo tempo','Pareggio o '+m.homeName+' 1°T'],betCls:'combo'});
      picks.push({bet:'1X primo tempo',conf,why:'Combo 1°T: casa NL da '+hNL1h+' · ospite NW da '+aNW1h+' ('+flt.short+')',lvl:conf>=80?'alta':'media',filter:flt.short});
    }
  }

  // Rimuovi duplicati dai picks (stessa scommessa)
  const seenPicks=new Set();
  const uniquePicks=picks.filter(p=>{
    const k=p.bet.toLowerCase().trim();
    if(seenPicks.has(k))return false;
    seenPicks.add(k);return true;
  }).sort((a,b)=>b.conf-a.conf).slice(0,8);

  // === RENDER ===
  function renderSig(s){
    const cls=s.type==='combo1h'?'pu':s.conf>=80?'hot':s.conf>=65?'warm':'cool';
    const confHtml=s.conf!=null?
      '<div class="sig-conf"><div class="sig-conf-n">'+s.conf+'<span style="font-size:9px;color:#6B7488">%</span></div><div class="sig-conf-l">conf.</div></div>':
      '<div class="sig-conf"><div style="font-size:18px">🎯</div></div>';
    return '<div class="sig '+cls+'"><div class="sig-top">'+confHtml+
      '<div class="sig-body"><div class="sig-title">'+s.title+'</div>'+
      '<div class="sig-why">'+s.why+'</div>'+
      '<div class="sig-bets">'+s.bets.map(b=>'<span class="sig-bet '+(s.betCls||'')+'">'+b+'</span>').join('')+
      (s.filterShort?'<span class="sig-bet" style="background:#1A202C;color:#525B6F">'+s.filterShort+'</span>':'')+
      '</div></div></div></div>';
  }

  const scored=m.homeScore!==null;
  let html=
    '<div class="det-h"><div>'+
      '<div class="det-t">'+m.homeName+(scored?' <span style="background:#1A202C;padding:2px 8px;border-radius:6px;font-size:15px">'+m.homeScore+'-'+m.awayScore+'</span> ':' <span style="color:#6B7488;font-weight:400">vs</span> ')+m.awayName+'</div>'+
      '<div class="det-m">'+m.leagueName+' · '+m.date+' · ore '+m.time+'</div>'+
    '</div><button class="btn" onclick="document.getElementById(\'an-ov\').classList.remove(\'on\')">✕ chiudi</button></div>'+
    '<div class="det-b">'+
    '<div class="flt"><div class="flt-l">⏳ Finestra analisi</div><div class="flt-p">'+
      ['10','20','50','all'].map(w=>'<button class="fp win '+(cw===w?'on':'')+'" onclick="cw=\''+w+'\';renderAnalisi(\'an-det\')">'+(w==='all'?'Tutte':'Ult.'+w)+'</button>').join('')+
    '</div></div>';

  // SOMMARIO SCOMMESSE
  if(uniquePicks.length){
    html+='<div class="summary"><div class="summary-h">✅ Scommesse suggerite</div>'+
      uniquePicks.map(p=>'<div class="pick">' +
        '<div class="pick-conf" style="color:'+(p.conf>=80?'#FF8E5E':p.conf>=65?'#FFB958':'#6BB4FF')+'">'+p.conf+'%</div>'+
        '<div class="pick-body"><div class="pick-bet">'+p.bet+'</div>' +
        '<div class="pick-why">'+p.why+'</div>' +
        '<span class="pick-lvl '+p.lvl+'">'+p.lvl+'</span>' +
        '</div></div>').join('')+
    '</div>';
  }

  // COMBO 1°T
  if(comboResults.length){
    html+='<div class="an-section"><div class="an-title"><span class="ico">⚡</span>Combo 1° Tempo</div>'+
      comboResults.map(renderSig).join('')+'</div>';
  }

  // CASA
  if(homeResults.length){
    html+='<div class="an-section"><div class="an-title"><span class="hp">Casa</span>'+m.homeName+'</div>'+
      homeResults.map(renderSig).join('')+'</div>';
  }

  // TRASFERTA
  if(awayResults.length){
    html+='<div class="an-section"><div class="an-title"><span class="ap">Trasferta</span>'+m.awayName+'</div>'+
      awayResults.map(renderSig).join('')+'</div>';
  }

  // H2H
  if(h2hResults.length){
    html+='<div class="an-section"><div class="an-title"><span class="ico">⚔️</span>Scontri diretti ('+h2h.length+' precedenti)</div>'+
      '<div class="sct">Ultimi risultati<div class="sl"></div></div>'+
      h2h.slice(0,6).map(x=>{
        const sw=String(x.homeId)!==String(m.homeId);
        const hs=sw?x.ag:x.hg,as=sw?x.hg:x.ag;
        return '<div class="h2r"><span class="h2-h">'+m.homeName+'</span><div><div class="h2-s">'+hs+'-'+as+'</div><div class="h2-d">'+x.d+'</div></div><span class="h2-a">'+m.awayName+'</span></div>';
      }).join('')+
      '<div class="sct">Segnali H2H<div class="sl"></div></div>'+
      h2hResults.map(renderSig).join('')+
    '</div>';
  }

  if(!homeResults.length&&!awayResults.length&&!h2hResults.length&&!comboResults.length){
    html+='<div class="nd" style="text-align:center;padding:20px">Nessuna striscia anomala rilevata per questa partita. I dati potrebbero essere insufficienti.</div>';
  }

  html+='</div>';
  document.getElementById(detId).innerHTML=html;
}

// ── RENDER STATISTICHE (tab partite) ──
function renderStats(detId){
  const m=curMatch;
  function sbC(v,l,cls,sub){return '<div class="sb '+(cls||'')+'"><div class="sb-l">'+l+'</div><div class="sb-v">'+v+'</div><div class="sb-s">'+(sub||'gare di fila')+'</div></div>';}
  function avC(v,l,cls){return '<div class="av '+(cls||'')+'"><div class="av-v">'+avN(v)+'</div><div class="av-l">'+l+'</div></div>';}

  function teamBlock(fxAll,name,isHome){
    const fx=wFx(fFx(fxAll,clv,m.compId,isHome));
    const fx1h=fx.filter(f=>f.hgf!=null);
    const fxXG=fx.filter(f=>f.xg!=null);
    const fxCo=fx.filter(f=>f.corners!=null);
    const fxSh=fx.filter(f=>f.shots!=null);
    const fxBC=fx.filter(f=>f.bigChances!=null);
    const fxSv=fx.filter(f=>f.saves!=null);
    const xgSum=fxXG.slice(0,3).reduce((s,f)=>s+(f.xg??0),0);
    const xgGoals=fxXG.slice(0,3).reduce((s,f)=>s+(f.gf??0),0);
    let xgSig='—',xgSigCls='flat';
    if(fxXG.length>0){
      if(xgGoals===0&&xgSum>=3.5){xgSig='⚡ Sblocco quasi certo';xgSigCls='hot';}
      else if(xgGoals<=1&&xgSum>=2.5){xgSig='Sblocco probabile';xgSigCls='warm';}
      else if(xgGoals===0&&xgSum<2){xgSig='Digiuno meritato';xgSigCls='cool';}
      else xgSig='In linea';
    }
    const coAvg=av(fxCo,f=>f.corners),coRec=av(fxCo.slice(0,4),f=>f.corners);
    const coGap=coAvg!=null&&coRec!=null?coAvg-coRec:null;
    const pd=par(fx);
    const odFin=over(fx,f=>f.gf+'-'+f.ga,1);
    const od1h=over(fx1h,f=>f.hgf+'-'+f.hga,1);
    return '<div class="an-section"><div class="an-title">'+(isHome?'<span class="hp">Casa</span>':'<span class="ap">Trasferta</span>')+name+
      ' <span style="font-size:10px;color:#525B6F">('+fx.length+' gare)</span>' +
      '<div style="margin-left:auto;display:flex;gap:2px">'+dots(fxAll.slice(0,5))+'</div></div>'+
      '<div class="sct">⚽ Medie gol<div class="sl"></div></div>'+
      '<div class="g4">'+avC(av(fx,f=>f.gf),'Gol fatti','hi')+avC(av(fx,f=>f.ga),'Gol subiti','')+avC(av(fx1h,f=>f.hgf),fx1h.length?'Gol 1°T':'Gol 1°T','')+avC(av(fx,f=>(f.gf??0)+(f.ga??0)),'Tot. gara','')+'</div>'+
      (fxXG.length?'<div class="sct">🎯 xG<div class="sl"></div></div>'+
        '<div style="background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.18);border-radius:9px;padding:10px 12px;margin-bottom:5px">'+
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:7px">'+
        '<div><div style="font-size:26px;font-weight:600;color:#6BB4FF">'+avN(xgSum)+'</div><div style="font-size:8px;color:#6B7488">somma xG ult.'+Math.min(3,fxXG.length)+'</div></div>'+
        '<div><div style="font-size:9px;color:#6B7488;text-transform:uppercase;font-weight:600;letter-spacing:.06em">Segnale</div>'+
        '<div style="font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;text-transform:uppercase;margin-top:4px;display:inline-block;background:'+(xgSigCls==='hot'?'rgba(255,107,53,.18)':xgSigCls==='warm'?'rgba(255,166,48,.15)':'rgba(59,158,255,.14)')+';color:'+(xgSigCls==='hot'?'#FF8E5E':xgSigCls==='warm'?'#FFB958':'#6BB4FF')+'">'+xgSig+'</div></div></div>'+
        '<div class="g3">'+avC(av(fxXG,f=>f.xg),'xG avg','bl')+avC(av(fxXG,f=>f.xg1h),'xG 1°T','bl')+avC(av(fxXG,f=>f.npxg),'npxG','bl')+'</div></div>'
        :'<div class="nd">⚠️ xG non disponibile.</div>')+
      (fxBC.length?'<div class="sct">💥 Big Chances<div class="sl"></div></div>'+
        '<div class="g3">'+avC(av(fxBC,f=>f.bigChances),'Create/gara','bl')+avC(av(fxBC,f=>f.bigChances1h),'Create 1°T','bl')+avC(av(fxBC,f=>f.bigChancesMissed),'Mancate','warm')+'</div>':'')+
      (fxSv.length?'<div class="sct">🧤 Parate subìte<div class="sl"></div></div>'+
        '<div class="g3">'+avC(av(fxSv,f=>f.saves),'Parate avv.','ye')+avC(av(fxSv,f=>f.saves1h),'Parate avv. 1°T','ye')+avC(av(fx.filter(f=>f.goalsPrevented!=null),f=>f.goalsPrevented),'Gol preventi','ye')+'</div>':'')+
      (fxSh.length?'<div class="sct">🏹 Tiri<div class="sl"></div></div>'+
        '<div class="g4">'+avC(av(fxSh,f=>f.shots),'Tot.','gr')+avC(av(fxSh,f=>f.shots1h),'1°T','gr')+avC(av(fxSh,f=>f.shotsOT),'In porta','gr')+avC(av(fxSh,f=>f.shotsOT1h),'In porta 1°T','gr')+'</div>':'')+
      (fxCo.length?'<div class="sct">🚩 Corner<div class="sl"></div></div>'+
        '<div class="g4">'+avC(coAvg,'Media','pu')+avC(av(fxCo,f=>f.corners1h),'1°T','pu')+avC(coRec,'Ult.4','pu')+
        '<div class="av"><div class="av-v" style="font-size:13px;margin-top:4px;color:'+(coGap!=null&&coGap>=1.5?'#A79BF8':'#525B6F')+'">'+(coGap!=null?avN(coGap):'—')+'</div><div class="av-l">Gap</div></div></div>':'')+
      '<div class="sct">📈 Strisce<div class="sl"></div></div>'+
      '<div class="g3">'+sbC(sk(fx,f=>(f.gf??0)===0),'Non segna',sk(fx,f=>(f.gf??0)===0)>=3?'warm':'')+sbC(sk(fx,f=>(f.gf??0)<=(f.ga??0)),'Non vince',sk(fx,f=>(f.gf??0)<=(f.ga??0))>=4?'warm':'')+sbC(sk(fx,f=>(f.gf??0)!==(f.ga??0)),'Non pareggia',sk(fx,f=>(f.gf??0)!==(f.ga??0))>=6?'warm':'')+'</div>'+
      '<div class="g3" style="margin-top:5px">'+sbC(sk(fx,f=>(f.gf??0)>=(f.ga??0)),'Imbattuta',sk(fx,f=>(f.gf??0)>=(f.ga??0))>=5?'safe':'')+sbC(sk(fx,f=>(f.ga??0)===0),'Porta inviolata',sk(fx,f=>(f.ga??0)===0)>=3?'cool':'')+
      '<div class="sb"><div class="sb-l">Somma gol</div><div class="sb-v" style="font-size:13px;margin-top:5px">'+pd.t+' '+pd.n+'</div><div class="sb-s">di fila</div></div></div>'+
      (fx1h.length?'<div class="sct">⏱ Primo tempo<div class="sl"></div></div>'+
        '<div class="g3">'+sbC(sk(fx1h,f=>(f.hgf??0)===0),'Non segna 1°T',sk(fx1h,f=>(f.hgf??0)===0)>=3?'warm':'')+sbC(sk(fx1h,f=>(f.hgf??0)<=(f.hga??0)),'Non vince 1°T',sk(fx1h,f=>(f.hgf??0)<=(f.hga??0))>=5?'hot':'')+sbC(sk(fx1h,f=>(f.hgf??0)>=(f.hga??0)),'Imbattuta 1°T',sk(fx1h,f=>(f.hgf??0)>=(f.hga??0))>=6?'hot':'')+'</div>'+
        '<div class="g3" style="margin-top:5px">'+sbC(sk(fx1h,f=>(f.hga??0)===0),'Inviolata 1°T',sk(fx1h,f=>(f.hga??0)===0)>=4?'cool':'')+'</div>'
        :'<div class="nd">⚠️ Dati 1°T non disponibili.</div>')+
      '<div class="sct">🎯 Ritardatari · finale<div class="sl"></div></div>'+
      (odFin.length?odFin.map(o=>'<div class="er"><span class="er-s'+(o.n>=8?' er-rare':'')+'">'+o.s+'</span><span class="er-m">manca da '+o.n+' (uscito '+o.f+'×)</span></div>').join(''):'<div class="er"><span class="er-m">Dati insufficienti</span></div>')+
      (fx1h.length?'<div class="sct">🎯 Ritardatari · 1°T<div class="sl"></div></div>'+
        (od1h.length?od1h.map(o=>'<div class="er"><span class="er-s'+(o.n>=5?' er-rare':'')+'">'+o.s+'</span><span class="er-m">manca da '+o.n+'</span></div>').join(''):'<div class="er"><span class="er-m">Dati insufficienti</span></div>'):'')
    +'</div>';
  }

  const h2h=m._h2h||[];
  const scored=m.homeScore!==null;
  document.getElementById(detId).innerHTML=
    '<div class="det-h"><div>'+
      '<div class="det-t">'+m.homeName+(scored?' <span style="background:#1A202C;padding:2px 8px;border-radius:6px;font-size:15px">'+m.homeScore+'-'+m.awayScore+'</span> ':' <span style="color:#6B7488;font-weight:400">vs</span> ')+m.awayName+'</div>'+
      '<div class="det-m">'+m.leagueName+' · '+m.date+' · ore '+m.time+'</div>'+
    '</div><button class="btn" onclick="document.getElementById(\'ov\').classList.remove(\'on\')">✕ chiudi</button></div>'+
    '<div class="det-b">'+
    '<div class="flt"><div class="flt-l">⏳ Finestra</div><div class="flt-p">'+
      ['10','20','50','all'].map(w=>'<button class="fp win '+(cw===w?'on':'')+'" onclick="cw=\''+w+'\';renderStats(\'det\')">'+(w==='all'?'Tutte':'Ult.'+w)+'</button>').join('')+
    '</div><div class="flt-l">🏟 Campo</div><div class="flt-p">'+
      '<button class="fp '+(clv==='all'?'on':'')+'" onclick="clv=\'all\';renderStats(\'det\')">Tutte</button>'+
      '<button class="fp '+(clv==='casa'?'on':'')+'" onclick="clv=\'casa\';renderStats(\'det\')">Casa/tras.</button>'+
      '<button class="fp '+(clv==='comp'?'on':'')+'" onclick="clv=\'comp\';renderStats(\'det\')">Solo '+m.leagueName+'</button>'+
      '<button class="fp '+(clv==='casaComp'?'on':'')+'" onclick="clv=\'casaComp\';renderStats(\'det\')">Casa+comp.</button>'+
    '</div></div>'+
    teamBlock(m._hfx,m.homeName,true)+
    teamBlock(m._afx,m.awayName,false)+
    '<div class="an-section"><div class="an-title"><span class="ico">⚔️</span>Scontri diretti ('+h2h.length+')</div>'+
      (h2h.length?h2h.slice(0,8).map(x=>{
        const sw=String(x.homeId)!==String(m.homeId);
        const hs=sw?x.ag:x.hg,as=sw?x.hg:x.ag;
        return '<div class="h2r"><span class="h2-h">'+m.homeName+'</span><div><div class="h2-s">'+hs+'-'+as+'</div><div class="h2-d">'+x.d+'</div></div><span class="h2-a">'+m.awayName+'</span></div>';
      }).join(''):'<div class="er"><span class="er-m">Nessun precedente</span></div>')+
    '</div>'+
    '</div>';
}

loadMatches(false);
</script>
</body>
</html>
