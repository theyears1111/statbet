<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatBet Terminal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--mono:ui-monospace,Menlo,monospace}
body{font-family:var(--font);background:#0A0D13;color:#E6E9EF;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:14px}
.shell{background:#0E1117;border:1px solid #1C2230;border-radius:18px;overflow:hidden}
.hd{padding:16px 20px;background:#12161F;border-bottom:1px solid #1C2230;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hd-l{display:flex;align-items:center;gap:12px}
.hd-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FF6B35,#D8431A);display:flex;align-items:center;justify-content:center;font-size:18px}
.hd-brand{font-size:16px;font-weight:600}
.hd-sub{font-size:11px;color:#6B7488;margin-top:2px;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#2BD673;box-shadow:0 0 6px #2BD673}
.btn{background:#1A202C;border:1px solid #232A38;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:#9AA4B8}
.btn:hover{background:#222A38;color:#E6E9EF}
/* TABS */
.tabs{display:flex;background:#12161F;border-bottom:1px solid #1C2230;padding:0 12px;gap:1px;overflow-x:auto}
.tab{padding:11px 14px;font-size:12px;color:#8A93A6;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.15s;flex-shrink:0}
.tab:hover{color:#E6E9EF}
.tab.on{color:#FF6B35;border-bottom-color:#FF6B35;font-weight:500}
.body{padding:14px 16px}
.pan{display:none}.pan.on{display:block}
/* DAY BAR */
.day-bar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.db{font-size:12px;padding:7px 13px;border-radius:9px;border:1px solid #232A38;background:#161B25;cursor:pointer;color:#8A93A6;text-align:center;min-width:68px}
.db:hover{border-color:#2E3848;color:#E6E9EF}
.db.on{background:#FF6B35;color:#fff;border-color:#FF6B35;font-weight:500}
.db-day{font-size:9px;opacity:.8;text-transform:uppercase;letter-spacing:.05em}
.db-date{font-size:13px;font-weight:600;margin-top:2px}
.db-n{font-size:9px;color:#6B7488;margin-top:2px}
.db.on .db-n{color:rgba(255,255,255,.7)}
.fbar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.fb{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid #232A38;background:#161B25;cursor:pointer;color:#8A93A6}
.fb:hover{border-color:#2E3848;color:#E6E9EF}
.fb.on{background:#E6E9EF;color:#0E1117;border-color:#E6E9EF;font-weight:500}
/* MATCH CARD */
.lgh{display:flex;align-items:center;gap:8px;padding:10px 2px 6px;font-size:9px;color:#6B7488;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.lgh .ln{flex:1;height:1px;background:#1C2230}
.mc{background:#141923;border:1px solid #1F2632;border-radius:12px;margin-bottom:6px;cursor:pointer;overflow:hidden;transition:.15s}
.mc:hover{border-color:#2E3848;background:#171D28}
.mc-strip{height:3px;background:#1C2230}
.mc-in{padding:11px 13px}
.mc-top{display:flex;align-items:center;gap:12px}
.mc-time{min-width:44px;text-align:center}
.mc-time-h{font-size:13px;font-weight:600}
.mc-time-s{font-size:9px;color:#6B7488;margin-top:2px}
.mc-tms{flex:1}
.mc-row{display:flex;align-items:center;gap:8px;padding:2px 0}
.mc-nm{font-size:14px;font-weight:500;flex:1}
.mc-sc{font-size:15px;font-weight:700;min-width:18px;text-align:right;font-family:var(--mono)}
/* STATO */
.state{text-align:center;padding:40px 20px;color:#7E8798}
.spinner{width:26px;height:26px;border:3px solid #1C2230;border-top-color:#FF6B35;border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:rgba(255,90,90,.08);border:1px solid rgba(255,90,90,.25);border-radius:10px;padding:12px;color:#FF9B9B;font-size:12px;line-height:1.6;margin-bottom:8px}
.li{display:flex;align-items:center;gap:8px;color:#7E8798;font-size:12px;padding:12px 0}
.sm{width:15px;height:15px;border:2px solid #1C2230;border-top-color:#FF6B35;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
/* ANALISI AVVIO */
.start-box{background:#141923;border:1px dashed #2A3344;border-radius:14px;padding:28px 20px;text-align:center;margin-bottom:14px}
.start-box h3{font-size:15px;font-weight:600;margin-bottom:8px}
.start-box p{font-size:12px;color:#7E8798;line-height:1.6;margin-bottom:16px}
.start-btn{background:linear-gradient(135deg,#FF6B35,#D8431A);color:#fff;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px}
.start-btn:hover{opacity:.9}
.prog{background:#1A202C;border-radius:6px;height:6px;overflow:hidden;margin:12px 0 6px}
.prog-fill{height:100%;background:linear-gradient(90deg,#FF6B35,#FFA630);transition:width .4s}
.prog-label{font-size:11px;color:#7E8798;text-align:center}
/* FILTRO TAB ANALISI */
.an-filter-bar{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.an-filter-bar .lbl{font-size:10px;color:#6B7488;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-right:4px}
.af{font-size:11px;padding:5px 11px;border-radius:7px;border:1px solid #232A38;background:#161B25;cursor:pointer;color:#8A93A6}
.af:hover{border-color:#2E3848;color:#E6E9EF}
.af.on{background:#FF6B35;color:#fff;border-color:#FF6B35;font-weight:500}
/* TABELLA */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid #1A202C}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#12161F}
th{padding:10px 14px;text-align:left;font-size:10px;color:#6B7488;font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid #1A202C}
th:hover{color:#E6E9EF}
th .sort-ico{margin-left:4px;opacity:.5;font-size:9px}
th.sorted{color:#FF6B35}
th.sorted .sort-ico{opacity:1;color:#FF6B35}
tbody tr{border-bottom:1px solid #1A202C;transition:.12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#171D28}
tbody tr.hot{background:linear-gradient(135deg,rgba(255,107,53,.06),transparent)}
td{padding:11px 14px;vertical-align:middle}
.td-match{font-size:11px;color:#7E8798;margin-top:2px}
.td-team{font-weight:500;font-size:14px}
.td-comp{font-size:10px;color:#6B7488;background:#1A202C;padding:1px 6px;border-radius:4px;display:inline-block;margin-top:3px}
.td-num{font-weight:600;font-family:var(--mono)}
.td-num.hot{color:#FF6B35;font-size:16px}
.td-num.warm{color:#FFA630;font-size:15px}
.td-num.cool{color:#6BB4FF}
.xg-bar{height:5px;border-radius:3px;background:#1A202C;margin-top:5px;overflow:hidden}
.xg-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3B9EFF,#6BB4FF)}
.bc-badge{font-size:10px;padding:2px 6px;border-radius:5px;background:rgba(255,107,53,.12);color:#FF8E5E;font-weight:500;display:inline-block;margin-top:3px}
.empty-row td{text-align:center;padding:30px;color:#525B6F;font-size:12px}
/* OVERLAY */
.ov{display:none;margin-top:12px}.ov.on{display:block}
.det{background:#141923;border:1px solid #1F2632;border-radius:14px;overflow:hidden}
.det-h{padding:15px 16px;background:#12161F;border-bottom:1px solid #1C2230;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.det-t{font-size:16px;font-weight:600}
.det-m{font-size:11px;color:#7E8798;margin-top:3px}
.det-b{padding:13px 15px}
.flt{margin-bottom:12px;padding:10px 12px;background:#0E1117;border:1px solid #1F2632;border-radius:10px}
.flt-l{font-size:9px;color:#6B7488;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:600}
.flt-l:not(:first-child){margin-top:10px}
.flt-p{display:flex;gap:4px;flex-wrap:wrap}
.fp{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid #232A38;background:#141923;cursor:pointer;color:#8A93A6}
.fp:hover{border-color:#2E3848;color:#E6E9EF}
.fp.on{background:#FF6B35;color:#fff;border-color:#FF6B35}
.fp.win.on{background:#3B9EFF;border-color:#3B9EFF}
.an-sec{background:#0E1117;border:1px solid #1A202C;border-radius:12px;padding:13px;margin-bottom:10px}
.an-sec-h{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.hp{font-size:8px;background:rgba(59,158,255,.18);color:#6BB4FF;padding:2px 7px;border-radius:6px;text-transform:uppercase;font-weight:700}
.ap{font-size:8px;background:rgba(255,107,53,.18);color:#FF8E5E;padding:2px 7px;border-radius:6px;text-transform:uppercase;font-weight:700}
.sct{font-size:9px;font-weight:700;color:#6B7488;text-transform:uppercase;letter-spacing:.1em;margin:11px 0 6px;display:flex;align-items:center;gap:6px}
.sct .sl{flex:1;height:1px;background:#1C2230;margin-left:3px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.av{background:#141923;border:1px solid #1A202C;border-radius:8px;padding:7px 6px;text-align:center}
.av.hi{border-color:rgba(255,107,53,.2);background:linear-gradient(160deg,rgba(255,107,53,.08),transparent)}
.av.bl{border-color:rgba(59,158,255,.2);background:linear-gradient(160deg,rgba(59,158,255,.05),transparent)}
.av.gr{border-color:rgba(43,214,115,.2);background:linear-gradient(160deg,rgba(43,214,115,.05),transparent)}
.av.pu{border-color:rgba(139,123,246,.2);background:linear-gradient(160deg,rgba(139,123,246,.05),transparent)}
.av.ye{border-color:rgba(255,214,0,.18);background:linear-gradient(160deg,rgba(255,214,0,.05),transparent)}
.av-v{font-size:16px;font-weight:600;line-height:1}
.av.hi .av-v{color:#FF8E5E}.av.bl .av-v{color:#6BB4FF}.av.gr .av-v{color:#4FDE8E}.av.pu .av-v{color:#A79BF8}.av.ye .av-v{color:#FFD700}
.av-l{font-size:8px;color:#6B7488;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.sb{background:#141923;border:1px solid #1A202C;border-radius:8px;padding:7px 8px}
.sb.hot{border-color:rgba(255,107,53,.3);background:linear-gradient(160deg,rgba(255,107,53,.08),transparent)}
.sb.warm{border-color:rgba(255,166,48,.28)}.sb.cool{border-color:rgba(59,158,255,.26)}.sb.safe{border-color:rgba(43,214,115,.26)}
.sb-l{font-size:8px;color:#7E8798;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.sb-v{font-size:17px;font-weight:600;line-height:1.05;margin-top:3px}
.sb.hot .sb-v{color:#FF6B35}.sb.warm .sb-v{color:#FFA630}.sb.cool .sb-v{color:#3B9EFF}.sb.safe .sb-v{color:#2BD673}
.sb-s{font-size:7px;color:#525B6F;margin-top:2px;text-transform:uppercase}
.h2r{display:grid;grid-template-columns:1fr 48px 1fr;gap:6px;padding:6px 8px;background:#141923;border:1px solid #1A202C;border-radius:8px;margin-bottom:3px;align-items:center}
.h2-s{text-align:center;font-weight:700;font-size:13px;background:#1A202C;border-radius:5px;padding:3px 0;font-family:var(--mono)}
.h2-h{text-align:right;font-size:11px}.h2-a{text-align:left;font-size:11px}
.h2-d{font-size:8px;color:#6B7488;text-align:center;margin-top:1px}
.er{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:#141923;border:1px solid #1A202C;border-radius:7px;margin-bottom:3px}
.er-s{font-size:12px;font-weight:700;font-family:var(--mono);letter-spacing:.06em}
.er-rare{color:#FF6B35}.er-m{font-size:10px;color:#7E8798}
.nd{font-size:11px;color:#525B6F;background:#12161F;border-radius:7px;padding:6px 9px;margin-top:4px;font-style:italic}
</style>
</head>
<body>
<div class="wrap"><div class="shell">
  <div class="hd">
    <div class="hd-l">
      <div class="hd-logo">📊</div>
      <div>
        <div class="hd-brand">StatBet Terminal</div>
        <div class="hd-sub"><span class="live-dot"></span><span id="sub">caricamento…</span></div>
      </div>
    </div>
    <button class="btn" onclick="refreshCurrent()">⟳ Aggiorna</button>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="switchTab('partite',this)">📅 Partite</div>
    <div class="tab" onclick="switchTab('nonsegna',this)">⚽ Non Segna</div>
    <div class="tab" onclick="switchTab('nopareggio',this)">🔁 No Pareggio</div>
    <div class="tab" onclick="switchTab('corner',this)">🚩 Corner</div>
    <div class="tab" onclick="switchTab('primotempo',this)">⏱ 1° Tempo</div>
  </div>
  <div class="body">
    <!-- TAB PARTITE -->
    <div id="pan-partite" class="pan on">
      <div id="day-bar" class="day-bar"></div>
      <div id="fbar" class="fbar"></div>
      <div id="ml"><div class="state"><div class="spinner"></div>Caricamento…</div></div>
      <div class="ov" id="ov"><div class="det" id="det"></div></div>
    </div>
    <!-- TAB NON SEGNA -->
    <div id="pan-nonsegna" class="pan">
      <div id="ns-content"></div>
      <div class="ov" id="ns-ov"><div class="det" id="ns-det"></div></div>
    </div>
    <!-- TAB NO PAREGGIO -->
    <div id="pan-nopareggio" class="pan">
      <div id="np-content"></div>
    </div>
    <!-- TAB CORNER -->
    <div id="pan-corner" class="pan">
      <div id="co-content"></div>
    </div>
    <!-- TAB PRIMO TEMPO -->
    <div id="pan-primotempo" class="pan">
      <div id="pt-content"></div>
    </div>
  </div>
</div></div>

<script>
// ── STATO GLOBALE ──
let ALL=[], curDay='', curLeague='all';
let TEAM_DATA = {}; // cache dati squadre: { teamId: { fixtures, matchInfo } }
let ANALYSIS_DONE = false, ANALYSIS_RUNNING = false;
let curFilter = 'all'; // filtro attivo per le tab analisi
let sortCol = null, sortDir = 1;
let curMatch = null, clv='all', cw='20';

const FILTERS = [
  {key:'all', label:'Tutte le competizioni'},
  {key:'casa', label:'Casa/Trasferta (tutte comp.)'},
  {key:'comp', label:'Solo competizione partita'},
  {key:'casaComp', label:'Casa/Tras. + comp. partita'},
  {key:'h2h_all', label:'H2H tutte'},
  {key:'h2h_comp', label:'H2H solo comp. partita'},
  {key:'h2h_casa', label:'H2H Casa/Tras. comp. partita'},
];

function refreshCurrent(){
  const active = document.querySelector('.tab.on')?.textContent?.trim();
  if(active==='📅 Partite') loadMatches(true);
}
function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.pan').forEach(p=>p.classList.remove('on'));
  document.getElementById('pan-'+name).classList.add('on');
  if(name!=='partite') openAnalysisTab(name);
}

// ── TAB PARTITE ──
async function loadMatches(force=false){
  document.getElementById('ml').innerHTML='<div class="state"><div class="spinner"></div>Caricamento…</div>';
  document.getElementById('ov').classList.remove('on');
  try{
    const r=await fetch('/api/matches'+(force?'?refresh=1':''));
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.error) throw new Error(j.error);
    ALL=j.matches||[];
    document.getElementById('sub').textContent=j.date+' · '+ALL.length+' partite'+(j.cached?' · cache':'');
    const today=new Date().toISOString().slice(0,10);
    const days=[...new Set(ALL.map(m=>m.date))].sort();
    curDay=days.includes(today)?today:(days[0]||today);
    buildDayBar(days); buildLeagueBar(); renderMatches();
  }catch(e){
    document.getElementById('ml').innerHTML='<div class="err">❌ '+e.message+'</div>';
  }
}
function buildDayBar(days){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('day-bar').innerHTML=days.map(d=>{
    const dt=new Date(d+'T12:00:00Z');
    const label=d===today?'Oggi':dt.toLocaleDateString('it-IT',{weekday:'short'});
    const num=dt.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    const n=ALL.filter(m=>m.date===d).length;
    return '<button class="db '+(d===curDay?'on':'')+'" onclick="setDay(\''+d+'\')">' +
      '<div class="db-day">'+label+'</div><div class="db-date">'+num+'</div>' +
      '<div class="db-n">'+n+' gare</div></button>';
  }).join('');
}
function buildLeagueBar(){
  const leagues=[...new Set(ALL.filter(m=>m.date===curDay).map(m=>m.leagueName))];
  document.getElementById('fbar').innerHTML=
    '<button class="fb '+(curLeague==='all'?'on':'')+'" onclick="setLeague(\'all\')">Tutte</button>'+
    leagues.map(l=>'<button class="fb '+(curLeague===l?'on':'')+'" onclick="setLeague(\''+l.replace(/'/g,'')+'\')">'+l+'</button>').join('');
}
function setDay(d){curDay=d;curLeague='all';document.getElementById('ov').classList.remove('on');buildDayBar([...new Set(ALL.map(m=>m.date))].sort());buildLeagueBar();renderMatches();}
function setLeague(l){curLeague=l;buildLeagueBar();renderMatches();}
function renderMatches(){
  const filtered=ALL.filter(m=>m.date===curDay&&(curLeague==='all'||m.leagueName===curLeague));
  if(!filtered.length){document.getElementById('ml').innerHTML='<div class="state">Nessuna partita.</div>';return;}
  const byL={};filtered.forEach(m=>{(byL[m.leagueName]=byL[m.leagueName]||[]).push(m);});
  let html='';
  for(const[lg,ms]of Object.entries(byL)){
    html+='<div class="lgh">'+lg+'<div class="ln"></div><span>'+ms.length+'</span></div>';
    ms.forEach(m=>{
      const scored=m.homeScore!==null&&m.awayScore!==null;
      html+='<div class="mc" onclick="openMatchDetail(\''+m.id+'\')">'+
        '<div class="mc-strip"></div><div class="mc-in"><div class="mc-top">'+
        '<div class="mc-time"><div class="mc-time-h">'+m.time.slice(0,5)+'</div><div class="mc-time-s">'+(m.status==='finished'?'FT':'')+'</div></div>'+
        '<div class="mc-tms">'+
        '<div class="mc-row"><span class="mc-nm">'+m.homeName+'</span>'+(scored?'<span class="mc-sc">'+m.homeScore+'</span>':'')+'</div>'+
        '<div class="mc-row"><span class="mc-nm">'+m.awayName+'</span>'+(scored?'<span class="mc-sc">'+m.awayScore+'</span>':'')+'</div>'+
        '</div></div></div></div>';
    });
  }
  document.getElementById('ml').innerHTML=html;
}

// ── TAB ANALISI ──
function openAnalysisTab(name){
  if(!ALL.length) return;
  const contentId = {nonsegna:'ns-content',nopareggio:'np-content',corner:'co-content',primotempo:'pt-content'}[name];
  if(!contentId) return;
  if(!ANALYSIS_DONE && !ANALYSIS_RUNNING){
    showStartBox(contentId, name);
    return;
  }
  if(ANALYSIS_RUNNING){
    document.getElementById(contentId).innerHTML='<div class="li"><div class="sm"></div>Analisi in corso, attendere…</div>';
    return;
  }
  renderTable(name, contentId, curFilter);
}

function showStartBox(contentId, tabName){
  document.getElementById(contentId).innerHTML=
    '<div class="start-box">'+
    '<h3>📊 Analisi settimanale</h3>'+
    '<p>Carica lo storico completo di tutte le squadre della settimana.<br>'+
    'Include xG, corner, tiri, big chances per ogni squadra.<br>'+
    '<b>Tempo stimato: 3-5 minuti.</b> I dati restano in cache per 4 ore.</p>'+
    '<button class="start-btn" onclick="startAnalysis(\''+tabName+'\')">🔍 Avvia Analisi Completa</button>'+
    '</div>';
}

async function startAnalysis(firstTab){
  ANALYSIS_RUNNING=true;
  TEAM_DATA={};
  const contentId={nonsegna:'ns-content',nopareggio:'np-content',corner:'co-content',primotempo:'pt-content'}[firstTab];

  // Tutte le squadre uniche della settimana
  const teams = [];
  const seen = new Set();
  for(const m of ALL){
    if(!seen.has(m.homeId)){ seen.add(m.homeId); teams.push({id:m.homeId,name:m.homeName,matchId:m.id,isHome:true,match:m}); }
    if(!seen.has(m.awayId)){ seen.add(m.awayId); teams.push({id:m.awayId,name:m.awayName,matchId:m.id,isHome:false,match:m}); }
  }

  const total=teams.length;
  let done=0;

  function updateProg(){
    const pct=Math.round(done/total*100);
    document.getElementById(contentId).innerHTML=
      '<div class="start-box">'+
      '<h3><div class="sm" style="display:inline-block;margin-right:8px"></div>Analisi in corso…</h3>'+
      '<p>Caricamento squadra '+(done)+'/'+total+
      (teams[done]?' — <b>'+teams[done].name+'</b>':'')+'</p>'+
      '<div class="prog"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="prog-label">'+pct+'% completato</div>'+
      '</div>';
  }

  updateProg();
  const delay=ms=>new Promise(r=>setTimeout(r,ms));

  for(const team of teams){
    try{
      await delay(500);
      const r=await fetch('/api/team?id='+team.id);
      const j=await r.json();
      TEAM_DATA[team.id]={
        fixtures: j.fixtures||[],
        name: team.name,
        isHome: team.isHome,
        match: team.match,
      };
    }catch(e){
      TEAM_DATA[team.id]={fixtures:[],name:team.name,isHome:team.isHome,match:team.match};
    }
    // Carica anche H2H per questa partita
    const m=team.match;
    const h2hKey=m.homeId+'_'+m.awayId;
    if(!TEAM_DATA['h2h_'+h2hKey]){
      try{
        await delay(300);
        const r=await fetch('/api/h2h?home='+m.homeId+'&away='+m.awayId);
        const j=await r.json();
        TEAM_DATA['h2h_'+h2hKey]=j.h2h||[];
      }catch(e){ TEAM_DATA['h2h_'+h2hKey]=[]; }
    }
    done++;
    updateProg();
  }

  ANALYSIS_DONE=true;
  ANALYSIS_RUNNING=false;
  renderTable(firstTab, contentId, curFilter);
  // Pre-renderizza anche le altre tab
  for(const[tab,cid]of Object.entries({nonsegna:'ns-content',nopareggio:'np-content',corner:'co-content',primotempo:'pt-content'})){
    if(tab!==firstTab) renderTable(tab,cid,curFilter);
  }
}

// ── UTILS STATISTICI ──
function av(arr,sel){const v=(arr||[]).map(sel).filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function avN(v,d){return v!=null?v.toFixed(d??1):'—'}
function sk(fx,c){let n=0;for(const f of fx){if(c(f))n++;else break;}return n;}
function fFx(fx,key,compId,isHome){
  if(key==='casa') return fx.filter(f=>f.h===(isHome?1:0));
  if(key==='comp') return fx.filter(f=>f.compId===compId);
  if(key==='casaComp') return fx.filter(f=>f.compId===compId&&f.h===(isHome?1:0));
  return fx;
}

// Calcola i dati per il filtro H2H
function getH2HFx(matchId, homeId, awayId, filterKey, compId){
  const h2hKey=homeId+'_'+awayId;
  const h2h=TEAM_DATA['h2h_'+h2hKey]||[];
  if(!h2h.length) return [];
  const norm=h2h.map(x=>{
    const isSwap=String(x.homeId)!==String(homeId);
    return{gf:isSwap?x.ag:x.hg, ga:isSwap?x.hg:x.ag, hgf:isSwap?x.hag:x.hhg, hga:isSwap?x.hhg:x.hag, compId:x.compId||'', h:1};
  });
  if(filterKey==='h2h_comp') return norm.filter(x=>x.compId===compId);
  if(filterKey==='h2h_casa') return norm; // già normalizzato dal punto di vista casa
  return norm; // h2h_all
}

// Ottieni fx filtrate per una squadra dato il filterKey
function getFilteredFx(teamId, filterKey, compId, isHome){
  const td=TEAM_DATA[teamId];
  if(!td) return [];
  const fx=td.fixtures||[];
  if(filterKey.startsWith('h2h_')){
    const m=td.match;
    return getH2HFx(m.id, m.homeId, m.awayId, filterKey, compId);
  }
  return fFx(fx, filterKey, compId, isHome);
}

// ── CALCOLO NON SEGNA ──
function calcNonSegna(teamId, filterKey){
  const td=TEAM_DATA[teamId];
  if(!td) return null;
  const m=td.match;
  const isHome=td.isHome;
  const compId=m.compId;
  const fx=getFilteredFx(teamId, filterKey, compId, isHome);
  if(!fx.length) return null;
  const ngS=sk(fx,f=>(f.gf??0)===0);
  if(ngS<2) return null;
  const streakFx=fx.slice(0,ngS);
  const xgSum=streakFx.reduce((s,f)=>s+(f.xg??0),0);
  if(xgSum<2.0) return null;
  const xg1hSum=streakFx.reduce((s,f)=>s+(f.xg1h??0),0);
  const bcTot=streakFx.reduce((s,f)=>s+(f.bigChances??0),0);
  const bcMiss=streakFx.reduce((s,f)=>s+(f.bigChancesMissed??0),0);
  const savesTot=streakFx.filter(f=>f.saves!=null).reduce((s,f)=>s+(f.saves??0),0);
  const savesAvg=av(streakFx.filter(f=>f.saves!=null),f=>f.saves);
  // Media gol fatti ultime 20 totali (forma recente)
  const fxAll=td.fixtures||[];
  const avgGf20=av(fxAll.slice(0,20),f=>f.gf)??0;
  // Media gol fatti solo nella competizione della partita
  const fxComp=fxAll.filter(f=>f.compId===compId);
  const avgGfComp=fxComp.length>=3?(av(fxComp,f=>f.gf)??0):null;
  // Media gol fatti solo casa/trasferta (ultime 20)
  const fxHA=fxAll.slice(0,20).filter(f=>f.h===(isHome?1:0));
  const avgGfHA=fxHA.length>=3?(av(fxHA,f=>f.gf)??0):null;
  // Confidenza
  let conf=50;
  if(xgSum>=4)conf+=25;else if(xgSum>=3)conf+=18;else if(xgSum>=2.5)conf+=12;else conf+=6;
  if(bcTot>=6)conf+=10;else if(bcTot>=3)conf+=5;
  if(bcMiss>=4)conf+=8;else if(bcMiss>=2)conf+=4;
  if(ngS>=5)conf+=10;else if(ngS>=4)conf+=6;else if(ngS>=3)conf+=3;
  if(avgGf20>=1.5)conf+=5;
  if(avgGfComp!=null&&avgGfComp>=1.5)conf+=3;
  conf=Math.min(96,conf);
  return{
    teamId,name:td.name,isHome,
    nextMatch:m.homeName+' vs '+m.awayName,
    nextDate:m.date,nextTime:m.time,
    leagueName:m.leagueName,compId,
    ngS,xgSum,xg1hSum,bcTot,bcMiss,
    savesTot,savesAvg,
    avgGf20,avgGfComp,avgGfHA,
    conf,role:isHome?'Casa':'Trasferta'
  };
}

// ── CALCOLO NO PAREGGIO ──
function calcNoPareggio(teamId, filterKey){
  const td=TEAM_DATA[teamId];
  if(!td) return null;
  const m=td.match;
  const isHome=td.isHome;
  const compId=m.compId;
  const fx=getFilteredFx(teamId, filterKey, compId, isHome);
  if(!fx.length) return null;
  const ndS=sk(fx,f=>(f.gf??0)!==(f.ga??0));
  // Soglia: almeno 10 gare o almeno 20
  if(ndS<8) return null;
  let conf=Math.min(88,38+ndS*4);
  return{teamId,name:td.name,isHome,nextMatch:m.homeName+' vs '+m.awayName,
    nextDate:m.date,nextTime:m.time,leagueName:m.leagueName,compId,
    ndS,conf,role:isHome?'Casa':'Trasferta'};
}

// ── CALCOLO CORNER ──
function calcCorner(teamId, filterKey){
  const td=TEAM_DATA[teamId];
  if(!td) return null;
  const m=td.match;
  const isHome=td.isHome;
  const compId=m.compId;
  const fx=getFilteredFx(teamId, filterKey, compId, isHome);
  const fxCo=fx.filter(f=>f.corners!=null);
  if(fxCo.length<5) return null;
  const coAvg=av(fxCo,f=>f.corners);
  const coRec=av(fxCo.slice(0,4),f=>f.corners);
  if(coAvg==null||coRec==null) return null;
  const gap=coAvg-coRec;
  if(gap<2) return null;
  let conf=Math.min(84,46+gap*7);
  return{teamId,name:td.name,isHome,nextMatch:m.homeName+' vs '+m.awayName,
    nextDate:m.date,nextTime:m.time,leagueName:m.leagueName,compId,
    coAvg,coRec,gap,conf,role:isHome?'Casa':'Trasferta'};
}

// ── CALCOLO PRIMO TEMPO ──
function calcPrimoTempo(teamId, filterKey){
  const td=TEAM_DATA[teamId];
  if(!td) return null;
  const m=td.match;
  const isHome=td.isHome;
  const compId=m.compId;
  const fx=getFilteredFx(teamId, filterKey, compId, isHome);
  const fx1h=fx.filter(f=>f.hgf!=null);
  if(fx1h.length<3) return null;
  const rows=[];
  const ng1h=sk(fx1h,f=>(f.hgf??0)===0);
  const nl1h=sk(fx1h,f=>(f.hgf??0)>=(f.hga??0));
  const nw1h=sk(fx1h,f=>(f.hgf??0)<=(f.hga??0));
  const nd1h=sk(fx1h,f=>(f.hgf??0)!==(f.hga??0));
  if(ng1h<2&&nl1h<4&&nw1h<6&&nd1h<6) return null;
  const xg1hSum=fx1h.slice(0,Math.max(ng1h,2)).reduce((s,f)=>s+(f.xg1h??0),0);
  return{teamId,name:td.name,isHome,nextMatch:m.homeName+' vs '+m.awayName,
    nextDate:m.date,nextTime:m.time,leagueName:m.leagueName,compId,
    ng1h,nl1h,nw1h,nd1h,xg1hSum,role:isHome?'Casa':'Trasferta'};
}

// ── RENDER TABLE ──
function renderTable(tabName, contentId, filterKey){
  if(!ANALYSIS_DONE){return;}

  // Filter bar
  const filterBar='<div class="an-filter-bar"><span class="lbl">Filtro:</span>'+
    FILTERS.map(f=>'<button class="af '+(curFilter===f.key?'on':'')+'" onclick="setAnFilter(\''+f.key+'\',\''+tabName+'\')">'+f.label+'</button>').join('')+'</div>';

  let rows=[];
  const allTeamIds=Object.keys(TEAM_DATA).filter(k=>!k.startsWith('h2h_'));

  if(tabName==='nonsegna'){
    rows=allTeamIds.map(id=>calcNonSegna(id,filterKey)).filter(Boolean);
    const sorted=sortRows(rows,'ngS',true);
    const html=filterBar+tableNonSegna(sorted);
    document.getElementById(contentId).innerHTML=html;
  } else if(tabName==='nopareggio'){
    rows=allTeamIds.map(id=>calcNoPareggio(id,filterKey)).filter(Boolean);
    const sorted=sortRows(rows,'ndS',true);
    document.getElementById(contentId).innerHTML=filterBar+tableNoPareggio(sorted);
  } else if(tabName==='corner'){
    rows=allTeamIds.map(id=>calcCorner(id,filterKey)).filter(Boolean);
    const sorted=sortRows(rows,'gap',true);
    document.getElementById(contentId).innerHTML=filterBar+tableCorner(sorted);
  } else if(tabName==='primotempo'){
    rows=allTeamIds.map(id=>calcPrimoTempo(id,filterKey)).filter(Boolean);
    document.getElementById(contentId).innerHTML=filterBar+tablePrimoTempo(rows);
  }
}

function setAnFilter(key, tabName){
  curFilter=key;
  const contentId={nonsegna:'ns-content',nopareggio:'np-content',corner:'co-content',primotempo:'pt-content'}[tabName];
  renderTable(tabName, contentId, key);
}

function sortRows(rows, col, desc){
  if(!sortCol) return [...rows].sort((a,b)=>desc?(b[col]||0)-(a[col]||0):(a[col]||0)-(b[col]||0));
  return [...rows].sort((a,b)=>sortDir===1?(b[sortCol]||0)-(a[sortCol]||0):(a[sortCol]||0)-(b[sortCol]||0));
}
function setSortCol(col,tabName){
  if(sortCol===col)sortDir*=-1;
  else{sortCol=col;sortDir=1;}
  const contentId={nonsegna:'ns-content',nopareggio:'np-content',corner:'co-content',primotempo:'pt-content'}[tabName];
  renderTable(tabName,contentId,curFilter);
}

function thSort(label,col,tabName,unit){
  const ico=sortCol===col?(sortDir===1?'↓':'↑'):'↕';
  return '<th class="'+(sortCol===col?'sorted':'')+'" onclick="setSortCol(\''+col+'\',\''+tabName+'\')">'+label+(unit?' <span style="color:#525B6F;font-weight:400;text-transform:none">('+unit+')</span>':'')+' <span class="sort-ico">'+ico+'</span></th>';

      '<td><div class="td-num '+(r.nd1h>=8?'hot':r.nd1h>=5?'warm':'')+'">'+r.nd1h+'</div></td>'+
    '</tr>').join('')+
    '</tbody></table></div>';
}

// ── DETTAGLIO "NON SEGNA" ──
function openNSDetail(teamId){
  const td=TEAM_DATA[teamId];
  if(!td) return;
  const m=td.match;
  curMatch={...m, _hfx:[], _afx:[], _h2h:[]};
  // Trova la partita completa in ALL
  const fullMatch=ALL.find(x=>x.id===m.id);
  if(!fullMatch) return;
  curMatch=fullMatch;
  curMatch._hfx=TEAM_DATA[m.homeId]?.fixtures||[];
  curMatch._afx=TEAM_DATA[m.awayId]?.fixtures||[];
  const h2hKey=m.homeId+'_'+m.awayId;
  curMatch._h2h=TEAM_DATA['h2h_'+h2hKey]||[];
  document.getElementById('ns-ov').classList.add('on');
  renderNSDetail(teamId);
  document.getElementById('ns-ov').scrollIntoView({behavior:'smooth'});
}

function renderNSDetail(teamId){
  const td=TEAM_DATA[teamId];
  const m=curMatch;
  const isHome=td.isHome;
  const fx=td.fixtures||[];
  const compId=m.compId;

  // Calcola per tutti i filtri
  const results=[];
  for(const flt of FILTERS){
    const fxF=getFilteredFx(teamId,flt.key,compId,isHome);
    if(!fxF.length) continue;
    const ngS=sk(fxF,f=>(f.gf??0)===0);
    if(ngS<1) continue;
    const streak=fxF.slice(0,Math.max(ngS,1));
    const xgSum=streak.reduce((s,f)=>s+(f.xg??0),0);
    const xg1h=streak.reduce((s,f)=>s+(f.xg1h??0),0);
    const bc=streak.reduce((s,f)=>s+(f.bigChances??0),0);
    const bcM=streak.reduce((s,f)=>s+(f.bigChancesMissed??0),0);
    const saves=av(streak.filter(f=>f.saves!=null),f=>f.saves);
    const avgGf=av(fxF,f=>f.gf);
    let conf=50;
    if(xgSum>=4)conf+=25;else if(xgSum>=3)conf+=18;else if(xgSum>=2.5)conf+=12;else if(xgSum>=1.5)conf+=6;
    if(bc>=6)conf+=10;else if(bc>=3)conf+=5;
    if(bcM>=4)conf+=8;else if(bcM>=2)conf+=4;
    if(ngS>=5)conf+=10;else if(ngS>=4)conf+=6;else if(ngS>=3)conf+=3;
    conf=Math.min(96,conf);
    results.push({filter:flt.label,ngS,xgSum,xg1h,bc,bcM,saves,avgGf:avgGf??0,conf});
  }

  const scored=m.homeScore!==null;
  document.getElementById('ns-det').innerHTML=
    '<div class="det-h"><div>'+
      '<div class="det-t">'+td.name+' — Analisi "Non Segna"</div>'+
      '<div class="det-m">Prossima: '+m.homeName+' vs '+m.awayName+' · '+m.date+' · ore '+m.time.slice(0,5)+' · '+m.leagueName+'</div>'+
    '</div><button class="btn" onclick="document.getElementById(\'ns-ov\').classList.remove(\'on\')">✕</button></div>'+
    '<div class="det-b">'+
    '<div class="tbl-wrap" style="margin-bottom:14px"><table>'+
    '<thead><tr><th>Filtro</th><th>Streak</th><th>xG acc.</th><th>xG 1°T</th><th>BC create</th><th>BC mancate</th><th>Parate avv.</th><th>Media gol</th><th>Conf.</th></tr></thead>'+
    '<tbody>'+
    results.map(r=>'<tr class="'+(r.ngS>=3?'hot':r.ngS>=2?'warm':'')+'">'+
      '<td style="font-size:11px;color:#9AA4B8">'+r.filter+'</td>'+
      '<td><b style="color:'+(r.ngS>=4?'#FF8E5E':r.ngS>=2?'#FFB958':'#E6E9EF')+'">'+r.ngS+'</b></td>'+
      '<td><b style="color:'+(r.xgSum>=3.5?'#FF8E5E':r.xgSum>=2?'#FFB958':'#6BB4FF')+'">'+avN(r.xgSum,2)+'</b></td>'+
      '<td>'+avN(r.xg1h,2)+'</td>'+
      '<td>'+r.bc+'</td>'+
      '<td>'+r.bcM+'</td>'+
      '<td>'+avN(r.saves)+'</td>'+
      '<td>'+avN(r.avgGf)+'</td>'+
      '<td><b style="color:'+confColor(r.conf)+'">'+r.conf+'%</b></td>'+
    '</tr>').join('')+
    '</tbody></table></div>'+
    // Ultime partite della striscia
    '<div style="font-size:10px;color:#6B7488;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:8px">Ultime partite (striscia senza gol)</div>'+
    fx.slice(0,8).map(f=>{
      const wl=(f.gf??0)>(f.ga??0)?'W':(f.gf??0)<(f.ga??0)?'L':'D';
      const ng=(f.gf??0)===0;
      return '<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:'+(ng?'rgba(255,107,53,.06)':'#141923')+';border:1px solid '+(ng?'rgba(255,107,53,.2)':'#1A202C')+';border-radius:7px;margin-bottom:3px">'+
        '<span style="font-size:10px;color:#6B7488;min-width:72px">'+f.d+'</span>'+
        '<span style="font-size:11px;font-weight:500;flex:1">vs '+f.oppName+'</span>'+
        '<span style="font-family:var(--mono);font-weight:700;font-size:13px;margin:0 8px">'+(f.gf??'?')+' - '+(f.ga??'?')+'</span>'+
        (f.xg!=null?'<span style="font-size:10px;color:#6BB4FF">xG: '+avN(f.xg,2)+'</span>':'')+
        '<span class="dt dt-'+wl+'">'+wl+'</span>'+
      '</div>';
    }).join('')+
    '</div>';
}

// ── MATCH DETAIL (tab partite) ──
async function openMatchDetail(id){
  const m=ALL.find(x=>String(x.id)===String(id));
  if(!m) return;
  curMatch=m; clv='all'; cw='20';
  document.getElementById('ov').classList.add('on');
  document.getElementById('det').innerHTML=
    '<div class="det-h"><div><div class="det-t">'+m.homeName+' vs '+m.awayName+'</div>'+
    '<div class="det-m">'+m.leagueName+' · '+m.date+' · ore '+m.time.slice(0,5)+'</div></div>'+
    '<button class="btn" onclick="document.getElementById(\'ov\').classList.remove(\'on\')">✕</button></div>'+
    '<div class="det-b"><div class="li"><div class="sm"></div>Caricamento…</div></div>';
  document.getElementById('ov').scrollIntoView({behavior:'smooth'});
  try{
    const[hR,aR,h2R]=await Promise.all([
      fetch('/api/team?id='+m.homeId).then(r=>r.json()),
      fetch('/api/team?id='+m.awayId).then(r=>r.json()),
      fetch('/api/h2h?home='+m.homeId+'&away='+m.awayId).then(r=>r.json()),
    ]);
    m._hfx=hR.fixtures||[];
    m._afx=aR.fixtures||[];
    m._h2h=h2R.h2h||[];
    renderStats('det','ov');
  }catch(e){
    document.getElementById('det').querySelector('.det-b').innerHTML='<div class="err">Errore: '+e.message+'</div>';
  }
}

function renderStats(detId,ovId){
  const m=curMatch;
  function avC(v,l,cls){return '<div class="av '+(cls||'')+'"><div class="av-v">'+avN(v)+'</div><div class="av-l">'+l+'</div></div>';}
  function sbC(v,l,cls){return '<div class="sb '+(cls||'')+'"><div class="sb-l">'+l+'</div><div class="sb-v">'+v+'</div><div class="sb-s">gare di fila</div></div>';}
  function over(fx,kFn){
    const seen={},freq={};
    fx.forEach((f,i)=>{const k=kFn(f);if(!k||k.includes('null'))return;if(!(k in seen))seen[k]=i;freq[k]=(freq[k]||0)+1;});
    return Object.keys(seen).filter(k=>freq[k]>=2).map(k=>({s:k,n:seen[k],f:freq[k]})).sort((a,b)=>b.n-a.n).slice(0,4);
  }
  function dots(fx){return fx.slice(0,5).map(f=>{const r=(f.gf??0)>(f.ga??0)?'W':(f.gf??0)<(f.ga??0)?'L':'D';return '<span class="dt dt-'+r+'">'+r+'</span>';}).join('');}
  function par(fx){if(!fx.length)return{t:'-',n:0};const p=(fx[0].gf??0)+(fx[0].ga??0);const isP=p%2===0;let n=0;for(const f of fx){if(((f.gf??0)+(f.ga??0))%2===0===isP)n++;else break;}return{t:isP?'Pari':'Dispari',n};}

  function teamBlock(fxAll,name,isHome){
    const fx=fFx(fxAll,clv,m.compId,isHome).slice(0,cw==='10'?10:cw==='20'?20:cw==='50'?50:9999);
    const fx1h=fx.filter(f=>f.hgf!=null);
    const fxXG=fx.filter(f=>f.xg!=null);
    const fxCo=fx.filter(f=>f.corners!=null);
    const fxSh=fx.filter(f=>f.shots!=null);
    const fxBC=fx.filter(f=>f.bigChances!=null);
    const fxSv=fx.filter(f=>f.saves!=null);
    const xgSum=fx.slice(0,3).reduce((s,f)=>s+(f.xg??0),0);
    const xgGoals=fx.slice(0,3).reduce((s,f)=>s+(f.gf??0),0);
    const coAvg=av(fxCo,f=>f.corners),coRec=av(fxCo.slice(0,4),f=>f.corners);
    const pd=par(fx);
    const odFin=over(fx,f=>f.gf+'-'+f.ga);
    const od1h=over(fx1h,f=>f.hgf+'-'+f.hga);
    let xgSig='—',xgSigCls='cool';
    if(fxXG.length>0){
      if(xgGoals===0&&xgSum>=3.5){xgSig='⚡ Sblocco quasi certo';xgSigCls='hot';}
      else if(xgGoals<=1&&xgSum>=2.5){xgSig='Sblocco probabile';xgSigCls='warm';}
      else if(xgGoals===0&&xgSum<2){xgSig='Digiuno meritato';xgSigCls='cool';}
      else xgSig='In linea';
    }
    return '<div class="an-sec"><div class="an-sec-h">'+(isHome?'<span class="hp">Casa</span>':'<span class="ap">Trasferta</span>')+name+
      ' <span style="font-size:10px;color:#525B6F">('+fx.length+' gare)</span>'+
      '<div style="margin-left:auto;display:flex;gap:2px">'+dots(fxAll.slice(0,5))+'</div></div>'+
      '<div class="sct">⚽ Medie gol<div class="sl"></div></div>'+
      '<div class="g4">'+avC(av(fx,f=>f.gf),'Gol fatti','hi')+avC(av(fx,f=>f.ga),'Gol subiti','')+avC(av(fx1h,f=>f.hgf),'Gol 1°T','')+avC(av(fx,f=>(f.gf??0)+(f.ga??0)),'Tot. gara','')+'</div>'+
      (fxXG.length?'<div class="sct">🎯 xG<div class="sl"></div></div>'+
        '<div style="background:rgba(59,158,255,.07);border:1px solid rgba(59,158,255,.15);border-radius:8px;padding:9px 11px;margin-bottom:5px">'+
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">'+
        '<div><div style="font-size:22px;font-weight:600;color:#6BB4FF">'+avN(xgSum)+'</div><div style="font-size:8px;color:#6B7488">somma xG ult.3</div></div>'+
        '<span style="font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600;background:'+(xgSigCls==='hot'?'rgba(255,107,53,.18)':xgSigCls==='warm'?'rgba(255,166,48,.14)':'rgba(59,158,255,.12)')+';color:'+(xgSigCls==='hot'?'#FF8E5E':xgSigCls==='warm'?'#FFB958':'#6BB4FF')+'">'+xgSig+'</span></div>'+
        '<div class="g3">'+avC(av(fxXG,f=>f.xg),'xG avg','bl')+avC(av(fxXG,f=>f.xg1h),'xG 1°T','bl')+avC(av(fxXG,f=>f.npxg),'npxG','bl')+'</div></div>'
      :'<div class="nd">⚠️ xG non disponibile.</div>')+
      (fxBC.length?'<div class="sct">💥 Big Chances<div class="sl"></div></div>'+
        '<div class="g3">'+avC(av(fxBC,f=>f.bigChances),'Create','bl')+avC(av(fxBC,f=>f.bigChances1h),'1°T','bl')+avC(av(fxBC,f=>f.bigChancesMissed),'Mancate','warm')+'</div>':'')+
      (fxSv.length?'<div class="sct">🧤 Parate subìte<div class="sl"></div></div>'+
        '<div class="g3">'+avC(av(fxSv,f=>f.saves),'Parate avv.','ye')+avC(av(fxSv,f=>f.saves1h),'1°T','ye')+avC(av(fx.filter(f=>f.goalsPrevented!=null),f=>f.goalsPrevented),'Gol preventi','ye')+'</div>':'')+
      (fxSh.length?'<div class="sct">🏹 Tiri<div class="sl"></div></div>'+
        '<div class="g4">'+avC(av(fxSh,f=>f.shots),'Tot.','gr')+avC(av(fxSh,f=>f.shots1h),'1°T','gr')+avC(av(fxSh,f=>f.shotsOT),'In porta','gr')+avC(av(fxSh,f=>f.shotsOT1h),'1°T porta','gr')+'</div>':'')+
      (fxCo.length?'<div class="sct">🚩 Corner<div class="sl"></div></div>'+
        '<div class="g4">'+avC(coAvg,'Media','pu')+avC(av(fxCo,f=>f.corners1h),'1°T','pu')+avC(coRec,'Ult.4','pu')+
        '<div class="av"><div class="av-v" style="font-size:13px;color:'+(coAvg&&coRec&&(coAvg-coRec)>=1.5?'#A79BF8':'#525B6F')+'">'+
        (coAvg&&coRec?avN(Math.abs(coAvg-coRec)):'—')+'</div><div class="av-l">Gap</div></div></div>':'')+
      '<div class="sct">📈 Strisce<div class="sl"></div></div>'+
      '<div class="g3">'+sbC(sk(fx,f=>(f.gf??0)===0),'Non segna',sk(fx,f=>(f.gf??0)===0)>=3?'warm':'')+sbC(sk(fx,f=>(f.gf??0)<=(f.ga??0)),'Non vince',sk(fx,f=>(f.gf??0)<=(f.ga??0))>=5?'warm':'')+sbC(sk(fx,f=>(f.gf??0)!==(f.ga??0)),'No pareggio',sk(fx,f=>(f.gf??0)!==(f.ga??0))>=8?'warm':'')+'</div>'+
      '<div class="g3" style="margin-top:5px">'+sbC(sk(fx,f=>(f.gf??0)>=(f.ga??0)),'Imbattuta',sk(fx,f=>(f.gf??0)>=(f.ga??0))>=7?'safe':'')+sbC(sk(fx,f=>(f.ga??0)===0),'Porta inviolata',sk(fx,f=>(f.ga??0)===0)>=3?'cool':'')+
      '<div class="sb"><div class="sb-l">Somma gol</div><div class="sb-v" style="font-size:12px;margin-top:3px">'+pd.t+' '+pd.n+'</div><div class="sb-s">di fila</div></div></div>'+
      (fx1h.length?'<div class="sct">⏱ 1°T<div class="sl"></div></div>'+
        '<div class="g3">'+sbC(sk(fx1h,f=>(f.hgf??0)===0),'Non segna 1°T',sk(fx1h,f=>(f.hgf??0)===0)>=3?'warm':'')+sbC(sk(fx1h,f=>(f.hgf??0)<=(f.hga??0)),'No vittoria 1°T',sk(fx1h,f=>(f.hgf??0)<=(f.hga??0))>=8?'hot':'')+sbC(sk(fx1h,f=>(f.hgf??0)>=(f.hga??0)),'Imbattuta 1°T',sk(fx1h,f=>(f.hgf??0)>=(f.hga??0))>=5?'hot':'')+'</div>'
      :'<div class="nd">⚠️ Dati 1°T non disponibili.</div>')+
      '<div class="sct">🎯 Ritardatari · finale<div class="sl"></div></div>'+
      (odFin.length?odFin.map(o=>'<div class="er"><span class="er-s'+(o.n>=8?' er-rare':'')+'">'+o.s+'</span><span class="er-m">manca da '+o.n+' (uscito '+o.f+'×)</span></div>').join(''):'<div class="er"><span class="er-m">Dati insufficienti</span></div>')+
      (fx1h.length&&od1h.length?'<div class="sct">🎯 Ritardatari · 1°T<div class="sl"></div></div>'+od1h.map(o=>'<div class="er"><span class="er-s">'+o.s+'</span><span class="er-m">manca da '+o.n+'</span></div>').join(''):'')
    +'</div>';
  }

  const h2h=m._h2h||[];
  const scored=m.homeScore!==null;
  document.getElementById(detId).innerHTML=
    '<div class="det-h"><div>'+
      '<div class="det-t">'+m.homeName+(scored?' <span style="background:#1A202C;padding:2px 8px;border-radius:5px;font-size:14px">'+m.homeScore+'-'+m.awayScore+'</span> ':' vs ')+m.awayName+'</div>'+
      '<div class="det-m">'+m.leagueName+' · '+m.date+' · ore '+m.time.slice(0,5)+'</div>'+
    '</div><button class="btn" onclick="document.getElementById(\''+ovId+'\').classList.remove(\'on\')">✕</button></div>'+
    '<div class="det-b">'+
    '<div class="flt"><div class="flt-l">⏳ Finestra</div><div class="flt-p">'+
      ['10','20','50','all'].map(w=>'<button class="fp win '+(cw===w?'on':'')+'" onclick="cw=\''+w+'\';renderStats(\''+detId+'\',\''+ovId+'\')">'+(w==='all'?'Tutte':'Ult.'+w)+'</button>').join('')+
    '</div><div class="flt-l">🏟 Campo</div><div class="flt-p">'+
      '<button class="fp '+(clv==='all'?'on':'')+'" onclick="clv=\'all\';renderStats(\''+detId+'\',\''+ovId+'\')">Tutte</button>'+
      '<button class="fp '+(clv==='casa'?'on':'')+'" onclick="clv=\'casa\';renderStats(\''+detId+'\',\''+ovId+'\')">Casa/Tras.</button>'+
      '<button class="fp '+(clv==='comp'?'on':'')+'" onclick="clv=\'comp\';renderStats(\''+detId+'\',\''+ovId+'\')">Solo comp.</button>'+
      '<button class="fp '+(clv==='casaComp'?'on':'')+'" onclick="clv=\'casaComp\';renderStats(\''+detId+'\',\''+ovId+'\')">Casa+comp.</button>'+
    '</div></div>'+
    teamBlock(m._hfx,m.homeName,true)+
    teamBlock(m._afx,m.awayName,false)+
    '<div class="an-sec"><div class="an-sec-h">⚔️ H2H ('+h2h.length+')</div>'+
      (h2h.length?h2h.slice(0,8).map(x=>{
        const sw=String(x.homeId)!==String(m.homeId);
        const hs=sw?x.ag:x.hg,as=sw?x.hg:x.ag;
        return '<div class="h2r"><span class="h2-h">'+m.homeName+'</span><div><div class="h2-s">'+hs+'-'+as+'</div><div class="h2-d">'+x.d+'</div></div><span class="h2-a">'+m.awayName+'</span></div>';
      }).join(''):'<div class="nd">Nessun precedente.</div>')+
    '</div></div>';
}

loadMatches(false);
</script>
